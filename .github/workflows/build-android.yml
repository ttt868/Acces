name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'cordova-app/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: cordova-app/package-lock.json
    
    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Accept Android SDK Licenses
      run: yes | sdkmanager --licenses || true
    
    - name: Install Android Build Tools and SDK 34
      run: |
        echo '📦 تثبيت Build Tools و SDK 34...'
        sdkmanager "build-tools;34.0.0" "platforms;android-34"
        echo '✅ تم تثبيت Build Tools'
    
    - name: Replace system Gradle with 8.7
      run: |
        echo '🔧 تثبيت Gradle 8.7...'
        sudo rm -rf /usr/share/gradle*
        wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
        sudo unzip -q /tmp/gradle.zip -d /opt/
        sudo ln -sf /opt/gradle-8.7/bin/gradle /usr/bin/gradle
        sudo ln -sf /opt/gradle-8.7/bin/gradle /usr/local/bin/gradle
        echo "GRADLE_HOME=/opt/gradle-8.7" >> $GITHUB_ENV
        echo "/opt/gradle-8.7/bin" >> $GITHUB_PATH
        gradle --version
    
    - name: Install Cordova CLI
      run: npm install -g cordova@12
    
    - name: Install project dependencies
      working-directory: cordova-app
      run: npm install
    
    - name: Install Cordova Plugins
      working-directory: cordova-app
      run: |
        echo '🔌 Installing Cordova plugins...'
        cordova plugin add cordova-plugin-splashscreen@6.0.2 --save
        cordova plugin add cordova-plugin-googleplus@8.5.2 --save \
          --variable WEB_APPLICATION_CLIENT_ID="586936149662-ja0tlfjfinl2sl17j9ntp3m1avnf3dhn.apps.googleusercontent.com" \
          --variable REVERSED_CLIENT_ID="com.googleusercontent.apps.586936149662-ja0tlfjfinl2sl17j9ntp3m1avnf3dhn" \
          --variable PLAY_SERVICES_VERSION="18.1.0"
    
    - name: Setup Fixed Debug Keystore
      run: |
        echo '🔑 Using fixed debug keystore for consistent SHA-1...'
        mkdir -p ~/.android
        cp cordova-app/keystores/debug.keystore ~/.android/debug.keystore
        echo '=================================================='
        echo 'FIXED SHA-1 (already registered in Google Cloud Console):'
        echo 'SHA1: B3:DC:1A:86:7C:AC:0C:7D:E2:1B:80:46:3D:49:5D:5C:BB:32:E0:A5'
        echo '=================================================='
        echo 'Package name: io.accessnetwork.app'
        echo '=================================================='

    - name: Add Android platform (cordova-android 13.0.0)
      working-directory: cordova-app
      env:
        CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-8.7-bin.zip
      run: |
        echo '📱 إضافة منصة Android 13.0.0...'
        cordova platform remove android 2>/dev/null || true
        cordova platform add android@13.0.0 --verbose
        echo '✅ تم إضافة منصة Android'
    
    - name: Force compatible dependency versions and fix color resource issue
      working-directory: cordova-app
      run: |
        echo '🔧 إصلاح تعارض المكتبات وإصلاح مشكلة الألوان...'
        echo "" >> platforms/android/build.gradle
        echo "// Force compatible versions for SDK 34 and cordova-android 13" >> platforms/android/build.gradle
        echo "subprojects {" >> platforms/android/build.gradle
        echo "    afterEvaluate { project ->" >> platforms/android/build.gradle
        echo "        if (project.hasProperty('android')) {" >> platforms/android/build.gradle
        echo "            project.android {" >> platforms/android/build.gradle
        echo "                compileSdkVersion 34" >> platforms/android/build.gradle
        echo "            }" >> platforms/android/build.gradle
        echo "        }" >> platforms/android/build.gradle
        echo "    }" >> platforms/android/build.gradle
        echo "    configurations.all {" >> platforms/android/build.gradle
        echo "        resolutionStrategy {" >> platforms/android/build.gradle
        echo "            force 'androidx.core:core:1.12.0'" >> platforms/android/build.gradle
        echo "            force 'androidx.core:core-ktx:1.12.0'" >> platforms/android/build.gradle
        echo "            force 'androidx.appcompat:appcompat:1.6.1'" >> platforms/android/build.gradle
        echo "            force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.24'" >> platforms/android/build.gradle
        echo "            force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.24'" >> platforms/android/build.gradle
        echo "            force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.24'" >> platforms/android/build.gradle
        echo "            // Force newer play-services-base that fixes Invalid color issue with AGP 8.x" >> platforms/android/build.gradle
        echo "            force 'com.google.android.gms:play-services-base:18.5.0'" >> platforms/android/build.gradle
        echo "            force 'com.google.android.gms:play-services-auth:21.2.0'" >> platforms/android/build.gradle
        echo "            force 'com.google.android.gms:play-services-identity:18.1.0'" >> platforms/android/build.gradle
        echo "        }" >> platforms/android/build.gradle
        echo "    }" >> platforms/android/build.gradle
        echo "}" >> platforms/android/build.gradle
        echo "" >> platforms/android/gradle.properties
        echo "# Disable AAPT2 strict resource validation to fix Invalid color error with Play Services" >> platforms/android/gradle.properties
        echo "android.enableResourceOptimizations=false" >> platforms/android/gradle.properties
        echo '✅ تم إصلاح التعارضات'
    
    - name: Build Debug APK
      working-directory: cordova-app
      env:
        CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-8.7-bin.zip
      run: |
        echo '🚧 بناء Debug APK...'
        cordova build android --debug --verbose
        echo '✅ تم بناء Debug APK'
    
    - name: Build Release APK
      working-directory: cordova-app
      env:
        CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-8.7-bin.zip
      run: |
        echo '🚧 بناء Release APK...'
        cordova build android --release --buildConfig=build.json --verbose
        echo '✅ تم بناء Release APK'
    
    - name: List APK files
      run: |
        echo "📱 ملفات APK المُنتجة:"
        find cordova-app/platforms/android -name "*.apk" -type f 2>/dev/null || echo "No APK found"
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: access-network-debug-apk
        path: cordova-app/platforms/android/app/build/outputs/apk/debug/*.apk
        if-no-files-found: warn
        retention-days: 30
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: access-network-release-apk
        path: cordova-app/platforms/android/app/build/outputs/apk/release/*.apk
        if-no-files-found: warn
        retention-days: 30
