name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'cordova-app/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: cordova-app/package-lock.json
    
    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Accept Android SDK Licenses
      run: yes | sdkmanager --licenses || true
    
    - name: Install Android Build Tools
      run: |
        echo '📦 تثبيت Build Tools 33.0.2...'
        sdkmanager "build-tools;33.0.2" "platforms;android-33"
        echo '✅ تم تثبيت Build Tools'
    
    - name: Replace system Gradle with 7.6
      run: |
        echo '🔧 استبدال Gradle 9.3 بـ 7.6...'
        sudo rm -rf /usr/share/gradle*
        wget -q https://services.gradle.org/distributions/gradle-7.6-bin.zip -O /tmp/gradle.zip
        sudo unzip -q /tmp/gradle.zip -d /opt/
        sudo ln -sf /opt/gradle-7.6/bin/gradle /usr/bin/gradle
        sudo ln -sf /opt/gradle-7.6/bin/gradle /usr/local/bin/gradle
        echo "GRADLE_HOME=/opt/gradle-7.6" >> $GITHUB_ENV
        echo "/opt/gradle-7.6/bin" >> $GITHUB_PATH
        gradle --version
    
    - name: Install Cordova CLI
      run: npm install -g cordova@12
    
    - name: Install project dependencies
      working-directory: cordova-app
      run: npm install
    
    - name: Install Cordova Plugins
      working-directory: cordova-app
      run: |
        echo '🔌 Installing Cordova plugins...'
        cordova plugin add cordova-plugin-splashscreen@6.0.2 --save
        cordova plugin add cordova-plugin-googleplus@8.5.2 --save --variable WEB_APPLICATION_CLIENT_ID="586936149662-ja0tlfjfinl2sl17j9ntp3m1avnf3dhn.apps.googleusercontent.com" --variable REVERSED_CLIENT_ID="com.googleusercontent.apps.586936149662-ja0tlfjfinl2sl17j9ntp3m1avnf3dhn"
    
    - name: Print Debug Keystore SHA-1 (for Google Cloud Console)
      run: |
        echo '🔑 Getting SHA-1 fingerprint for Google Sign-In...'
        echo '=================================================='
        echo 'ADD THIS SHA-1 TO GOOGLE CLOUD CONSOLE:'
        echo '=================================================='
        # Create debug keystore if not exists
        if [ ! -f ~/.android/debug.keystore ]; then
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi
        # Print SHA-1
        keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android | grep "SHA1:" | sed 's/.*SHA1: /SHA1: /'
        echo '=================================================='
        echo 'Go to: https://console.cloud.google.com/apis/credentials'
        echo 'Edit your Android OAuth Client and add this SHA-1'
        echo 'Package name: io.accessnetwork.app'
        echo '=================================================='
        echo '✅ Plugins installed'

    - name: Add Android platform with Gradle 7.6
      working-directory: cordova-app
      env:
        CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-7.6-bin.zip
      run: |
        echo '📱 إضافة منصة Android...'
        cordova platform remove android 2>/dev/null || true
        cordova platform add android@12.0.1 --verbose
        echo '✅ تم إضافة منصة Android'
    
    - name: Build Debug APK
      working-directory: cordova-app
      env:
        CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-7.6-bin.zip
      run: |
        echo '🚧 بناء Debug APK...'
        cordova build android --debug --verbose
        echo '✅ تم بناء Debug APK'
    
    - name: Build Release APK
      working-directory: cordova-app
      env:
        CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-7.6-bin.zip
      run: |
        echo '🚧 بناء Release APK...'
        cordova build android --release --buildConfig=build.json --verbose
        echo '✅ تم بناء Release APK'
    
    - name: List APK files
      run: |
        echo "📱 ملفات APK المُنتجة:"
        find cordova-app/platforms/android -name "*.apk" -type f 2>/dev/null || echo "No APK found"
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: access-network-debug-apk
        path: cordova-app/platforms/android/app/build/outputs/apk/debug/*.apk
        if-no-files-found: warn
        retention-days: 30
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: access-network-release-apk
        path: cordova-app/platforms/android/app/build/outputs/apk/release/*.apk
        if-no-files-found: warn
        retention-days: 30
