name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'cordova-app/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: cordova-app/package-lock.json
    
    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Accept Android SDK Licenses
      run: yes | sdkmanager --licenses || true
    
    - name: Install Android Build Tools and SDK 33+34
      run: |
        echo '📦 Installing Build Tools and SDK...'
        sdkmanager "build-tools;33.0.2" "build-tools;34.0.0" "platforms;android-33" "platforms;android-34"
        echo '✅ Build Tools installed'
    
    - name: Replace system Gradle with 7.6.4
      run: |
        echo '🔧 Installing Gradle 7.6.4...'
        sudo rm -rf /usr/share/gradle*
        wget -q https://services.gradle.org/distributions/gradle-7.6.4-bin.zip -O /tmp/gradle.zip
        sudo unzip -q /tmp/gradle.zip -d /opt/
        sudo ln -sf /opt/gradle-7.6.4/bin/gradle /usr/bin/gradle
        sudo ln -sf /opt/gradle-7.6.4/bin/gradle /usr/local/bin/gradle
        echo "GRADLE_HOME=/opt/gradle-7.6.4" >> $GITHUB_ENV
        echo "/opt/gradle-7.6.4/bin" >> $GITHUB_PATH
        gradle --version
    
    - name: Install Cordova CLI
      run: npm install -g cordova@12
    
    - name: Install project dependencies
      working-directory: cordova-app
      run: npm install
    
    - name: Install Cordova Plugins (without local-notification)
      working-directory: cordova-app
      run: |
        echo '🔌 Installing Cordova plugins...'
        cordova plugin add cordova-plugin-splashscreen@6.0.2 --save
        cordova plugin add cordova-plugin-googleplus@8.5.2 --save \
          --variable WEB_APPLICATION_CLIENT_ID="586936149662-ja0tlfjfinl2sl17j9ntp3m1avnf3dhn.apps.googleusercontent.com" \
          --variable REVERSED_CLIENT_ID="com.googleusercontent.apps.586936149662-ja0tlfjfinl2sl17j9ntp3m1avnf3dhn" \
          --variable PLAY_SERVICES_VERSION="20.7.0"
        echo '🔥 Installing Firebase Cloud Messaging plugin (latest with Android 12 fix)...'
        cordova plugin add cordova-plugin-firebase-messaging@7.0.2 --save
        echo '� Installing AdMob plugin for rewarded ads...'
        cordova plugin add admob-plus-cordova@1.28.0 --save \
          --variable APP_ID_ANDROID="ca-app-pub-3940256099942544~3347511713"
        echo '�🔔 Removing local-notification plugin to avoid SDK compatibility issues...'
        cordova plugin remove cordova-plugin-local-notification 2>/dev/null || true
    
    - name: Setup Release Keystore for Signing
      run: |
        echo '🔑 Setting up release keystore...'
        mkdir -p ~/.android
        # Copy debug keystore
        cp cordova-app/keystores/debug.keystore ~/.android/debug.keystore
        # Copy release keystore to cordova-app directory
        echo '=================================================='
        echo 'Release Keystore SHA-1 (register this in Google Cloud Console):'
        keytool -list -v -keystore cordova-app/access-network.keystore -alias access-network -storepass Access2026Secure 2>/dev/null | grep SHA1 || true
        echo '=================================================='
        echo 'Package name: io.accessnetwork.app'
        echo '=================================================='

    - name: Add Android platform (cordova-android 12.0.1)
      working-directory: cordova-app
      env:
        CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-7.6.4-bin.zip
      run: |
        echo '📱 Adding Android platform 12.0.1...'
        cordova platform remove android 2>/dev/null || true
        cordova platform add android@12.0.1 --verbose
        echo '✅ Android platform added'
    
    - name: Copy google-services.json for Firebase
      working-directory: cordova-app
      run: |
        echo '🔥 Copying google-services.json for Firebase...'
        cp google-services.json platforms/android/app/google-services.json
        echo '✅ google-services.json copied to platforms/android/app/'

    - name: Remove local-notification from platform
      working-directory: cordova-app
      run: |
        echo '🔧 Removing local-notification plugin from platform...'
        rm -rf platforms/android/app/src/main/java/de/appplant 2>/dev/null || true
        echo '✅ Removed local-notification'
    
    - name: Fix play-services-identity version in plugin
      working-directory: cordova-app
      run: |
        echo '🔧 Fixing play-services-identity version...'
        find platforms/android -name "*.gradle" -exec sed -i 's/play-services-identity:20\.7\.0/play-services-identity:18.1.0/g' {} \;
        find platforms/android -name "*.gradle" -exec sed -i 's/play-services-identity:\$\{PLAY_SERVICES_VERSION\}/play-services-identity:18.1.0/g' {} \;
        echo '✅ Fixed play-services-identity version'

    - name: Fix AdMob plugin Java compatibility
      working-directory: cordova-app
      run: |
        echo '🔧 Fixing AdMob getVersionString() for newer SDK...'
        ADMOB_JAVA="platforms/android/app/src/main/java/admob/plus/cordova/AdMob.java"
        if [ -f "$ADMOB_JAVA" ]; then
          sed -i 's/MobileAds.getVersionString()/MobileAds.getVersion().toString()/g' "$ADMOB_JAVA"
          echo '✅ Fixed getVersionString → getVersion().toString()'
        else
          echo '⚠️ AdMob.java not found (might be Kotlin version)'
        fi

    - name: Patch AdMob plugin - Fix ad disappearing on background
      working-directory: cordova-app
      run: |
        echo '🔧 Patching admob-plus plugin to prevent ad dismiss on background...'
        echo ''
        echo '📋 Root cause: admob-plus calls clear() in onAdShowedFullScreenContent()'
        echo '   which nullifies the ad reference. Also onDestroy() destroys all ads.'
        echo '   When app goes to background, the ad Activity gets dismissed.'
        echo '   Fix: Remove clear()/null assignments that kill ad references.'
        echo '   Reference: cordova-plugin-ads by cozycodegh does NOT do this and works.'
        echo ''
        
        REWARDED="platforms/android/app/src/main/java/admob/plus/cordova/ads/Rewarded.java"
        INTERSTITIAL="platforms/android/app/src/main/java/admob/plus/cordova/ads/Interstitial.java"
        ADMOB="platforms/android/app/src/main/java/admob/plus/cordova/AdMob.java"
        
        # === Patch 1: Rewarded.java ===
        if [ -f "$REWARDED" ]; then
          echo '--- Patching Rewarded.java ---'
          python3 << 'PATCH_REWARDED'
import re

filepath = "platforms/android/app/src/main/java/admob/plus/cordova/ads/Rewarded.java"
with open(filepath, 'r') as f:
    content = f.read()

original = content

# Fix 1: Remove clear() from onAdShowedFullScreenContent
# This is the PRIMARY cause - nullifying ad reference when ad is shown
# means the ad object can be GC'd and AdActivity loses its backing reference
content = re.sub(
    r'(onAdShowedFullScreenContent\(\)\s*\{[\s\n]*?)clear\(\);',
    r'\1// clear(); // PATCHED: keep ad reference alive for background survival',
    content
)

# Fix 2: Remove clear() from onDestroy
# When CordovaActivity is destroyed (can happen on background),
# don't nullify the ad - the ad Activity should survive independently
content = re.sub(
    r'(public void onDestroy\(\)\s*\{[\s\n]*?)clear\(\);',
    r'\1// clear(); // PATCHED: skip cleanup for background survival',
    content
)

if content != original:
    with open(filepath, 'w') as f:
        f.write(content)
    print('✅ Rewarded.java patched (2 fixes applied)')
else:
    print('⚠️ Rewarded.java - no changes made (patterns not found)')
PATCH_REWARDED
        else
          echo '⚠️ Rewarded.java not found'
        fi
        
        # === Patch 2: Interstitial.java ===
        if [ -f "$INTERSTITIAL" ]; then
          echo '--- Patching Interstitial.java ---'
          python3 << 'PATCH_INTERSTITIAL'
import re

filepath = "platforms/android/app/src/main/java/admob/plus/cordova/ads/Interstitial.java"
with open(filepath, 'r') as f:
    content = f.read()

original = content

# Fix 1: Remove mAd = null from onAdShowedFullScreenContent
content = re.sub(
    r'(onAdShowedFullScreenContent\(\)\s*\{[\s\n]*?)mAd = null;',
    r'\1// mAd = null; // PATCHED: keep ad reference alive for background survival',
    content
)

# Fix 2: Remove clear() from onDestroy
content = re.sub(
    r'(public void onDestroy\(\)\s*\{[\s\n]*?)clear\(\);',
    r'\1// clear(); // PATCHED: skip cleanup for background survival',
    content
)

if content != original:
    with open(filepath, 'w') as f:
        f.write(content)
    print('✅ Interstitial.java patched (2 fixes applied)')
else:
    print('⚠️ Interstitial.java - no changes made (patterns not found)')
PATCH_INTERSTITIAL
        else
          echo '⚠️ Interstitial.java not found'
        fi
        
        # === Patch 3: AdMob.java - Remove ad destroy loop in onDestroy ===
        if [ -f "$ADMOB" ]; then
          echo '--- Patching AdMob.java onDestroy ---'
          python3 << 'PATCH_ADMOB'
filepath = "platforms/android/app/src/main/java/admob/plus/cordova/AdMob.java"
with open(filepath, 'r') as f:
    content = f.read()

# Comment out the for loop in onDestroy that destroys all ads
# This loop iterates every ad and calls ad.onDestroy() which nullifies
# references and removes from the static ads SparseArray.
# When CordovaActivity goes to background, this kills all fullscreen ads.
old_loop = """        for (int i = 0; i < ads.size(); i++) {
            AdBase ad = (AdBase) ads.valueAt(i);
            ad.onDestroy();
        }"""

new_loop = """        // PATCHED: Don't destroy fullscreen ads on activity lifecycle
        // This prevents rewarded/interstitial ads from being dismissed
        // when the app goes to background and CordovaActivity is destroyed.
        // Reference: cordova-plugin-ads (cozycodegh) does not clean up ads in onDestroy.
        // for (int i = 0; i < ads.size(); i++) {
        //     AdBase ad = (AdBase) ads.valueAt(i);
        //     ad.onDestroy();
        // }"""

if old_loop in content:
    content = content.replace(old_loop, new_loop)
    with open(filepath, 'w') as f:
        f.write(content)
    print('✅ AdMob.java onDestroy ad cleanup loop commented out')
else:
    print('⚠️ AdMob.java - destroy loop pattern not found, trying alternative...')
    # Try with different whitespace
    import re
    content_new = re.sub(
        r'(\s+)for \(int i = 0; i < ads\.size\(\); i\+\+\) \{\s*\n\s*AdBase ad = \(AdBase\) ads\.valueAt\(i\);\s*\n\s*ad\.onDestroy\(\);\s*\n\s*\}',
        r'\1// PATCHED: Don\'t destroy ads on background\n\1// for (int i = 0; i < ads.size(); i++) {\n\1//     AdBase ad = (AdBase) ads.valueAt(i);\n\1//     ad.onDestroy();\n\1// }',
        content
    )
    if content_new != content:
        with open(filepath, 'w') as f:
            f.write(content_new)
        print('✅ AdMob.java patched via regex alternative')
    else:
        print('❌ Could not patch AdMob.java onDestroy')
PATCH_ADMOB
        fi
        
        echo ''
        echo '✅ All admob-plus background patches applied'
        echo '📋 Summary of changes:'
        echo '  - Rewarded.java: removed clear() from onAdShowedFullScreenContent + onDestroy'
        echo '  - Interstitial.java: removed mAd=null from onAdShowedFullScreenContent + clear() from onDestroy'
        echo '  - AdMob.java: commented out ads destroy loop in onDestroy'

    - name: Fix AndroidManifest for AdMob background retention
      working-directory: cordova-app
      run: |
        echo '🔧 Patching AndroidManifest.xml for ad background retention...'
        MANIFEST="platforms/android/app/src/main/AndroidManifest.xml"
        if [ -f "$MANIFEST" ]; then
          echo '📋 Original MainActivity entry:'
          grep -n 'MainActivity' "$MANIFEST" || true
          
          # Add alwaysRetainTaskState="true" and clearTaskOnLaunch="false" to MainActivity
          # alwaysRetainTaskState: prevents system from resetting task state after inactivity
          # clearTaskOnLaunch: prevents clearing activities above root when relaunching from home
          sed -i 's/<activity\s\+android:name="MainActivity"/<activity android:name="MainActivity" android:alwaysRetainTaskState="true" android:clearTaskOnLaunch="false"/' "$MANIFEST"
          
          # Verify alwaysRetainTaskState
          if ! grep -q 'alwaysRetainTaskState' "$MANIFEST"; then
            sed -i '/<activity.*MainActivity/s/android:name/android:alwaysRetainTaskState="true" android:clearTaskOnLaunch="false" android:name/' "$MANIFEST"
          fi
          
          # Verify clearTaskOnLaunch separately if alwaysRetainTaskState worked but clearTaskOnLaunch didn't
          if grep -q 'alwaysRetainTaskState' "$MANIFEST" && ! grep -q 'clearTaskOnLaunch' "$MANIFEST"; then
            sed -i 's/alwaysRetainTaskState="true"/alwaysRetainTaskState="true" android:clearTaskOnLaunch="false"/' "$MANIFEST"
          fi
          
          # Verify results
          if grep -q 'alwaysRetainTaskState="true"' "$MANIFEST"; then
            echo '✅ alwaysRetainTaskState="true" added'
          else
            echo '❌ FAILED to add alwaysRetainTaskState'
          fi
          if grep -q 'clearTaskOnLaunch="false"' "$MANIFEST"; then
            echo '✅ clearTaskOnLaunch="false" added'
          else
            echo '❌ FAILED to add clearTaskOnLaunch'
          fi
          
          echo '📋 Patched MainActivity entry:'
          grep -n 'MainActivity' "$MANIFEST" || true
        else
          echo '❌ AndroidManifest.xml not found!'
        fi
    
    - name: Force compatible dependency versions
      working-directory: cordova-app
      run: |
        echo '🔧 Fixing library conflicts...'
        cat >> platforms/android/build.gradle << 'GRADLE_CONFIG'
        
        // Force compatible versions for SDK 34 and cordova-android 12
        // Solution from: https://stackoverflow.com/questions/79408107
        allprojects {
            configurations.all {
                // Exclude error_prone_annotations to fix D8 dexing NullPointerException
                exclude group: "com.google.errorprone", module: "error_prone_annotations"
            }
        }
        
        subprojects {
            afterEvaluate { project ->
                if (project.hasProperty('android')) {
                    project.android {
                        compileSdkVersion 34
                    }
                }
            }
            configurations.all {
                resolutionStrategy {
                    force 'androidx.core:core:1.12.0'
                    force 'androidx.core:core-ktx:1.12.0'
                    force 'androidx.appcompat:appcompat:1.6.1'
                    force 'org.jetbrains.kotlin:kotlin-stdlib:1.7.22'
                    force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.7.22'
                    force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.7.22'
                    force 'com.google.android.gms:play-services-auth:20.7.0'
                    force 'com.google.android.gms:play-services-identity:18.1.0'
                    force 'com.google.android.gms:play-services-base:18.3.0'
                    force 'com.google.android.gms:play-services-basement:18.3.0'
                    force 'com.google.android.gms:play-services-ads:22.6.0'
                    force 'com.google.android.gms:play-services-ads-lite:22.6.0'
                }
            }
        }
        GRADLE_CONFIG
        echo '✅ Library conflicts fixed (error_prone_annotations excluded)'
    
    - name: Build Debug APK
      working-directory: cordova-app
      env:
        CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-7.6.4-bin.zip
      run: |
        echo '🚧 Building Debug APK...'
        cordova build android --debug --verbose
        echo '✅ Debug APK built'
    
    - name: Build Release APK (Signed)
      working-directory: cordova-app
      env:
        CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-7.6.4-bin.zip
      run: |
        echo '🚧 Building Signed Release APK...'
        echo '📋 Using keystore: access-network.keystore'
        # Verify keystore exists
        ls -la access-network.keystore
        # Build APK (not AAB) with packageType flag
        cordova build android --release --buildConfig=build.json -- --packageType=apk --verbose
        echo '✅ Release APK built and signed'
        # Verify the APK was created
        echo '📱 Checking output files:'
        find platforms/android -name "*.apk" -o -name "*.aab" -type f 2>/dev/null | head -10
    
    - name: List APK files
      run: |
        echo "📱 Generated APK files:"
        find cordova-app/platforms/android -name "*.apk" -type f 2>/dev/null || echo "No APK found"
        echo "📦 Generated AAB files:"
        find cordova-app/platforms/android -name "*.aab" -type f 2>/dev/null || echo "No AAB found"
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: access-network-debug-apk
        path: cordova-app/platforms/android/app/build/outputs/apk/debug/*.apk
        if-no-files-found: warn
        retention-days: 30
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: access-network-release-apk
        path: cordova-app/platforms/android/app/build/outputs/apk/release/*.apk
        if-no-files-found: warn
        retention-days: 30
    
    - name: Upload Release AAB (for Google Play)
      uses: actions/upload-artifact@v4
      with:
        name: access-network-release-aab
        path: cordova-app/platforms/android/app/build/outputs/bundle/release/*.aab
        if-no-files-found: warn
        retention-days: 30

