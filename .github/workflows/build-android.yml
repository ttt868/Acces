name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'cordova-app/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: cordova-app/package-lock.json
    
    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Accept Android SDK Licenses
      run: yes | sdkmanager --licenses || true
    
    - name: Install Android Build Tools and SDK 35
      run: |
        echo '📦 Installing Build Tools and SDK...'
        sdkmanager "build-tools;34.0.0" "build-tools;35.0.0" "platforms;android-34" "platforms;android-35"
        echo '✅ Build Tools installed'
    
    - name: Replace system Gradle with 8.9.0
      run: |
        echo '🔧 Installing Gradle 8.9.0...'
        sudo rm -rf /usr/share/gradle*
        wget -q https://services.gradle.org/distributions/gradle-8.9-bin.zip -O /tmp/gradle.zip
        sudo unzip -q /tmp/gradle.zip -d /opt/
        sudo ln -sf /opt/gradle-8.9/bin/gradle /usr/bin/gradle
        sudo ln -sf /opt/gradle-8.9/bin/gradle /usr/local/bin/gradle
        echo "GRADLE_HOME=/opt/gradle-8.9" >> $GITHUB_ENV
        echo "/opt/gradle-8.9/bin" >> $GITHUB_PATH
        gradle --version
    
    - name: Install Cordova CLI
      run: npm install -g cordova@12
    
    - name: Install project dependencies
      working-directory: cordova-app
      run: npm install
    
    - name: Clean platforms before plugin install
      working-directory: cordova-app
      run: |
        echo '🧹 Removing stale platforms/android to avoid API load errors...'
        rm -rf platforms/android
        echo '✅ Cleaned'

    - name: Install Cordova Plugins (without local-notification)
      working-directory: cordova-app
      run: |
        echo '🔌 Installing Cordova plugins...'
        cordova plugin add cordova-plugin-splashscreen@6.0.2 --save
        cordova plugin add cordova-plugin-googleplus@8.5.2 --save \
          --variable WEB_APPLICATION_CLIENT_ID="586936149662-ja0tlfjfinl2sl17j9ntp3m1avnf3dhn.apps.googleusercontent.com" \
          --variable REVERSED_CLIENT_ID="com.googleusercontent.apps.586936149662-ja0tlfjfinl2sl17j9ntp3m1avnf3dhn" \
          --variable PLAY_SERVICES_VERSION="20.7.0"
        echo '🔥 Installing Firebase Cloud Messaging plugin (latest with Android 12 fix)...'
        cordova plugin add cordova-plugin-firebase-messaging@7.0.2 --save
        echo '📢 AdMob plugin (cordova-plugin-ads) will be installed from config.xml during platform add'
        echo '🔔 Removing local-notification plugin to avoid SDK compatibility issues...'
        cordova plugin remove cordova-plugin-local-notification 2>/dev/null || true
    
    - name: Setup Release Keystore for Signing
      run: |
        echo '🔑 Setting up release keystore...'
        mkdir -p ~/.android
        # Copy debug keystore
        cp cordova-app/keystores/debug.keystore ~/.android/debug.keystore
        # Use the existing keystore from the repo (NEVER generate a new one)
        if [ -f "cordova-app/access-network.keystore" ]; then
          echo '✅ Using existing release keystore from repo'
          keytool -list -keystore cordova-app/access-network.keystore \
            -storepass "${KEYSTORE_PASSWORD:-Access2026Secure}" | head -5
        else
          echo '❌ ERROR: access-network.keystore not found in repo!'
          echo 'This keystore must be committed to the repo to keep the same app signature.'
          exit 1
        fi
        echo '=================================================='
        echo 'Package name: io.accessnetwork.app'
        echo '=================================================='

    - name: Generate build.json for signing
      working-directory: cordova-app
      env:
        KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
      run: |
        PASS="${KS_PASS:-Access2026Secure}"
        echo "{\"android\":{\"debug\":{\"keystore\":\"access-network.keystore\",\"storePassword\":\"${PASS}\",\"alias\":\"access-network\",\"password\":\"${PASS}\",\"keystoreType\":\"jks\"},\"release\":{\"keystore\":\"access-network.keystore\",\"storePassword\":\"${PASS}\",\"alias\":\"access-network\",\"password\":\"${PASS}\",\"keystoreType\":\"jks\"}}}" > build.json
        echo '✅ build.json generated'

    - name: Auto bump Android versionCode in CI
      working-directory: cordova-app
      env:
        RUN_NUMBER: ${{ github.run_number }}
      run: |
        echo '🔢 Auto-bumping app version for this CI run...'
        CFG="config.xml"
        VERSION_CODE=$((20000 + RUN_NUMBER))
        VERSION_NAME="1.0.${RUN_NUMBER}"

        if grep -q 'android-versionCode="' "$CFG"; then
          sed -E -i "0,/<widget /s/android-versionCode=\"[0-9]+\"/android-versionCode=\"${VERSION_CODE}\"/" "$CFG"
        else
          sed -E -i "0,/<widget /s/<widget /<widget android-versionCode=\"${VERSION_CODE}\" /" "$CFG"
        fi

        sed -E -i "0,/<widget /s/version=\"[0-9]+\.[0-9]+\.[0-9]+\"/version=\"${VERSION_NAME}\"/" "$CFG"
        echo "✅ android-versionCode=${VERSION_CODE}, version=${VERSION_NAME}"
        grep -n '<widget ' "$CFG"

    - name: Add Android platform (cordova-android 14)
      working-directory: cordova-app
      env:
        CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-8.9-bin.zip
      run: |
        echo '📱 Adding Android platform 14...'
        cordova platform remove android 2>/dev/null || true
        cordova platform add android@14 --verbose
        echo '✅ Android platform added'
    
    - name: Copy google-services.json for Firebase
      working-directory: cordova-app
      run: |
        echo '🔥 Copying google-services.json for Firebase...'
        cp google-services.json platforms/android/app/google-services.json
        echo '✅ google-services.json copied to platforms/android/app/'

    - name: Remove local-notification from platform
      working-directory: cordova-app
      run: |
        echo '🔧 Removing local-notification plugin from platform...'
        rm -rf platforms/android/app/src/main/java/de/appplant 2>/dev/null || true
        echo '✅ Removed local-notification'

    - name: Patch NavigationBar plugin for WindowInsetsController API 30+
      working-directory: cordova-app
      run: |
        echo '🔧 Patching NavigationBar plugin for modern Android...'
        NAV_JAVA="platforms/android/app/src/main/java/com/viniciusfagundes/cordova/plugin/navigationbar/NavigationBar.java"
        if [ -f "$NAV_JAVA" ]; then
          cp plugins/cordova-plugin-navigationbar-color/src/android/NavigationBar.java "$NAV_JAVA"
          echo '✅ NavigationBar.java patched with WindowInsetsController support'
        else
          echo '⚠️ NavigationBar.java not found at expected path'
        fi
    
    - name: Fix play-services-identity version in plugin
      working-directory: cordova-app
      run: |
        echo '🔧 Fixing play-services-identity version...'
        find platforms/android -name "*.gradle" -exec sed -i 's/play-services-identity:20\.7\.0/play-services-identity:18.1.0/g' {} \;
        find platforms/android -name "*.gradle" -exec sed -i 's/play-services-identity:\$\{PLAY_SERVICES_VERSION\}/play-services-identity:18.1.0/g' {} \;
        echo '✅ Fixed play-services-identity version'

    - name: Fix AdMob APPLICATION_ID in AndroidManifest
      working-directory: cordova-app
      run: |
        echo '🔧 Fixing AdMob APPLICATION_ID in AndroidManifest...'
        MANIFEST="platforms/android/app/src/main/AndroidManifest.xml"
        if [ -f "$MANIFEST" ]; then
          # cordova-plugin-ads hardcodes the developer's APP_ID in plugin.xml
          # Replace it with our test app ID (change to production when ready)
          sed -i 's/ca-app-pub-4029587076166791~9642866395/ca-app-pub-3940256099942544~3347511713/g' "$MANIFEST"
          
          # Remove duplicate meta-data and activity entries (multi-line XML blocks)
          echo '🔧 Removing duplicate manifest entries...'
          echo "Before fix:" && grep -c 'APPLICATION_ID' "$MANIFEST" && echo 'APPLICATION_ID occurrences'
          # Use perl to remove duplicate multi-line meta-data blocks
          perl -0777 -i -pe '
            # Remove duplicate APPLICATION_ID meta-data (keep first)
            my $pat1 = qr/(\s*<meta-data\s+android:name="com\.google\.android\.gms\.ads\.APPLICATION_ID"\s+android:value="[^"]*"\s*\/>)/s;
            if (($_ =~ m/$pat1/g) && ($_ =~ m/$pat1/g)) {
              $_ =~ s/(.*?$pat1)(.*?)$pat1/$1$2/s;
            }
            # Remove duplicate DELAY_APP_MEASUREMENT_INIT meta-data (keep first)
            my $pat2 = qr/(\s*<meta-data\s+android:name="com\.google\.android\.gms\.ads\.DELAY_APP_MEASUREMENT_INIT"\s+android:value="[^"]*"\s*\/>)/s;
            if (($_ =~ m/$pat2/g) && ($_ =~ m/$pat2/g)) {
              $_ =~ s/(.*?$pat2)(.*?)$pat2/$1$2/s;
            }
            # Remove ALL manual AdActivity declarations from plugin
            # AdMob SDK AAR provides correct AdActivity via manifest merge at compile
            # Plugin Theme.Translucent declaration can interfere with ad lifecycle on background
            s/\s*<activity[^>]*android:name="com\.google\.android\.gms\.ads\.AdActivity"[^>]*\/>//gs;
          ' "$MANIFEST"
          echo "After fix:" && grep -c 'APPLICATION_ID' "$MANIFEST" && echo 'APPLICATION_ID occurrences'
          grep -n 'APPLICATION_ID' "$MANIFEST" || true
        fi

    - name: Fix AndroidManifest for background retention
      working-directory: cordova-app
      run: |
        echo '🔧 Patching AndroidManifest.xml for background retention...'
        MANIFEST="platforms/android/app/src/main/AndroidManifest.xml"
        if [ -f "$MANIFEST" ]; then
          # Add alwaysRetainTaskState and clearTaskOnLaunch to MainActivity
          sed -i 's/<activity\s\+android:name="MainActivity"/<activity android:name="MainActivity" android:alwaysRetainTaskState="true" android:clearTaskOnLaunch="false"/' "$MANIFEST"
          if ! grep -q 'alwaysRetainTaskState' "$MANIFEST"; then
            sed -i '/<activity.*MainActivity/s/android:name/android:alwaysRetainTaskState="true" android:clearTaskOnLaunch="false" android:name/' "$MANIFEST"
          fi
          grep -q 'alwaysRetainTaskState' "$MANIFEST" && echo '✅ alwaysRetainTaskState added' || echo '⚠️ Could not add'
          grep -q 'clearTaskOnLaunch' "$MANIFEST" && echo '✅ clearTaskOnLaunch added' || echo '⚠️ Could not add'
          echo '📋 Patched MainActivity entry:'
          grep -n 'MainActivity' "$MANIFEST" || true
        fi
    
    - name: Patch AdMob plugin Java for background ad survival
      working-directory: cordova-app
      run: |
        echo '🔧 Patching AdMob plugin Java code for background ad survival...'
        PLUGIN_JAVA="platforms/android/app/src/main/java/ca/cozycode/cordova/ads/AdMobPlugin.java"
        
        if [ ! -f "$PLUGIN_JAVA" ]; then
          echo "❌ Plugin Java not found at expected path"
          find platforms/android -name "AdMobPlugin.java" 2>/dev/null || true
          echo "⚠️ Continuing without Java patch"
          exit 0
        fi
        
        cat > /tmp/patch_admob.py << 'PYEOF'
        import sys, re
        
        filepath = sys.argv[1]
        with open(filepath, 'r') as f:
            content = f.read()
        
        print("Original file size:", len(content), "bytes")
        
        # 1. Add lifecycle tracking fields after existing field
        old_field = 'Boolean mRewardedAdRewarded = false;'
        new_fields = ('Boolean mRewardedAdRewarded = false;\n'
                      '    private boolean mIsAppPaused = false;\n'
                      '    private boolean mRewardedDismissedWhilePaused = false;\n'
                      '    private JSONObject mPendingRewardResult = null;')
        if old_field in content:
            content = content.replace(old_field, new_fields, 1)
            print("Step 1 OK: Lifecycle fields added")
        else:
            print("Step 1 FAIL: Could not find field marker")
        
        # 2. Add onPause/onResume before onDestroy
        lifecycle = (
            '    @Override\n'
            '    public void onPause(boolean multitasking) {\n'
            '        super.onPause(multitasking);\n'
            '        mIsAppPaused = true;\n'
            '        Log.d(TAG, "AdMobPlugin: onPause");\n'
            '    }\n'
            '\n'
            '    @Override\n'
            '    public void onResume(boolean multitasking) {\n'
            '        super.onResume(multitasking);\n'
            '        mIsAppPaused = false;\n'
            '        Log.d(TAG, "AdMobPlugin: onResume pendingDismiss=" + mRewardedDismissedWhilePaused);\n'
            '        if (mRewardedDismissedWhilePaused) {\n'
            '            mRewardedDismissedWhilePaused = false;\n'
            '            Log.d(TAG, "AdMobPlugin: sending deferred reward callback");\n'
            '            if (mRewarededNext != null && mPendingRewardResult != null) {\n'
            '                mRewarededNext.callbackContext.success(mPendingRewardResult);\n'
            '                mRewarededNext = null;\n'
            '            }\n'
            '            mPendingRewardResult = null;\n'
            '            mRewardedAd = null;\n'
            '            View mainView = getView();\n'
            '            if (mainView != null) {\n'
            '                mainView.requestFocus();\n'
            '            }\n'
            '        }\n'
            '    }\n'
            '\n'
        )
        ondestroy = re.search(r'(\s+@Override\s+public void onDestroy\(\)\s*\{)', content)
        if ondestroy:
            pos = ondestroy.start()
            content = content[:pos] + '\n' + lifecycle + content[pos:]
            print("Step 2 OK: onPause/onResume added before onDestroy")
        else:
            print("Step 2 FAIL: Could not find onDestroy")
        
        # 3. Modify rewarded ad onAdDismissedFullScreenContent
        old_d = 'logInfo("rewarded ad dismissed fullscreen content.");'
        new_d = (
            'logInfo("rewarded ad dismissed fullscreen content. isPaused=" + mIsAppPaused);\n'
            '                                  if (mIsAppPaused) {\n'
            '                                      Log.d(TAG, "Ad dismissed while paused - deferring callback");\n'
            '                                      mRewardedDismissedWhilePaused = true;\n'
            '                                      mPendingRewardResult = rewardObject(mRewardedAdRewarded,mRewardedAdRewardedAmount,mRewardedAdRewardedType);\n'
            '                                      return;\n'
            '                                  }'
        )
        if old_d in content:
            content = content.replace(old_d, new_d, 1)
            print("Step 3 OK: onAdDismissedFullScreenContent patched")
        else:
            print("Step 3 FAIL: Could not find dismiss callback")
        
        with open(filepath, 'w') as f:
            f.write(content)
        print("Patched file size:", len(content), "bytes")
        print("Patching complete")
        PYEOF
        
        python3 /tmp/patch_admob.py "$PLUGIN_JAVA"
        
        echo "📋 Verifying Java patch:"
        grep -c "mIsAppPaused" "$PLUGIN_JAVA" && echo "  ✅ Lifecycle fields found" || echo "  ❌ Fields missing"
        grep -c "public void onPause" "$PLUGIN_JAVA" && echo "  ✅ onPause found" || echo "  ❌ onPause missing"
        grep -c "public void onResume" "$PLUGIN_JAVA" && echo "  ✅ onResume found" || echo "  ❌ onResume missing"
        grep -c "mRewardedDismissedWhilePaused" "$PLUGIN_JAVA" && echo "  ✅ Defer logic found" || echo "  ❌ Defer missing"

    - name: Force compatible dependency versions
      working-directory: cordova-app
      run: |
        echo '🔧 Fixing library conflicts...'
        cat >> platforms/android/build.gradle << 'GRADLE_CONFIG'
        
        // Force compatible versions for SDK 35 and cordova-android 14
        allprojects {
            configurations.all {
                // Exclude error_prone_annotations to fix D8 dexing NullPointerException
                exclude group: "com.google.errorprone", module: "error_prone_annotations"
            }
        }
        
        subprojects {
            afterEvaluate { project ->
                if (project.hasProperty('android')) {
                    project.android {
                        compileSdkVersion 35
                    }
                }
            }
            configurations.all {
                resolutionStrategy {
                    force 'androidx.core:core:1.13.1'
                    force 'androidx.core:core-ktx:1.13.1'
                    force 'androidx.appcompat:appcompat:1.7.0'
                    force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.22'
                    force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.22'
                    force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.22'
                    force 'com.google.android.gms:play-services-auth:20.7.0'
                    force 'com.google.android.gms:play-services-identity:18.1.0'
                    force 'com.google.android.gms:play-services-base:18.3.0'
                    force 'com.google.android.gms:play-services-basement:18.3.0'
                    force 'com.google.android.gms:play-services-ads:23.0.0'
                    force 'com.google.android.gms:play-services-ads-lite:23.0.0'
                }
            }
        }
        GRADLE_CONFIG
        echo '✅ Library conflicts fixed (error_prone_annotations excluded)'

    - name: Patch FCM plugin for transaction notification logo
      working-directory: cordova-app
      run: |
        echo '🖼️ Patching FirebaseMessagingPluginService.java for transaction logo...'
        PATCH_SRC="hooks/patches/FirebaseMessagingPluginService.java"
        PATCH_DEST="platforms/android/app/src/main/java/by/chemerisuk/cordova/firebase/FirebaseMessagingPluginService.java"
        if [ -f "$PATCH_SRC" ] && [ -f "$PATCH_DEST" ]; then
          cp "$PATCH_SRC" "$PATCH_DEST"
          echo '✅ FCM plugin patched with setLargeIcon for transaction logos'
        else
          echo "⚠️ Patch source or dest not found"
          ls -la "$PATCH_SRC" 2>/dev/null || echo "Missing: $PATCH_SRC"
          ls -la "$PATCH_DEST" 2>/dev/null || echo "Missing: $PATCH_DEST"
        fi
    
    - name: Build Debug APK
      working-directory: cordova-app
      env:
        CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-8.9-bin.zip
      run: |
        echo '🚧 Building Debug APK (using compile to preserve manifest fixes)...'
        cordova compile android --debug --verbose
        echo '✅ Debug APK built'
    
    - name: Build Release APK (Signed)
      working-directory: cordova-app
      env:
        CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-8.9-bin.zip
      run: |
        echo '🚧 Building Signed Release APK (using compile to preserve manifest fixes)...'
        echo '📋 Using keystore: access-network.keystore'
        # Verify keystore exists
        ls -la access-network.keystore
        # Build APK with packageType flag - use compile to skip re-prepare
        cordova compile android --release --buildConfig=build.json -- --packageType=apk --verbose
        echo '✅ Release APK built and signed'
        # Verify the APK was created
        echo '📱 Checking output files:'
        find platforms/android -name "*.apk" -o -name "*.aab" -type f 2>/dev/null | head -10
    
    - name: Build Release AAB (for Google Play)
      working-directory: cordova-app
      env:
        CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-8.9-bin.zip
      run: |
        echo '🚧 Building Signed Release AAB for Google Play...'
        echo '📋 Using keystore: access-network.keystore'
        # Verify keystore exists
        ls -la access-network.keystore
        # Build AAB (bundle) - required for Google Play Store
        cordova compile android --release --buildConfig=build.json -- --packageType=bundle --verbose
        echo '✅ Release AAB built and signed'
        # Verify the AAB was created
        echo '📦 Checking AAB output files:'
        find platforms/android -name "*.aab" -type f 2>/dev/null
    
    - name: List APK files
      run: |
        echo "📱 Generated APK files:"
        find cordova-app/platforms/android -name "*.apk" -type f 2>/dev/null || echo "No APK found"
        echo "📦 Generated AAB files:"
        find cordova-app/platforms/android -name "*.aab" -type f 2>/dev/null || echo "No AAB found"
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: access-network-debug-apk
        path: cordova-app/platforms/android/app/build/outputs/apk/debug/*.apk
        if-no-files-found: warn
        retention-days: 30
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: access-network-release-apk
        path: cordova-app/platforms/android/app/build/outputs/apk/release/*.apk
        if-no-files-found: warn
        retention-days: 30
    
    - name: Upload Release AAB (for Google Play)
      uses: actions/upload-artifact@v4
      with:
        name: access-network-release-aab
        path: cordova-app/platforms/android/app/build/outputs/bundle/release/*.aab
        if-no-files-found: error
        retention-days: 30

