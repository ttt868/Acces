name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'cordova-app/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: cordova-app/package-lock.json
    
    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Accept Android SDK Licenses
      run: yes | sdkmanager --licenses || true
    
    - name: Install Android Build Tools and SDK 33
      run: |
        echo '📦 Installing Build Tools and SDK 33...'
        sdkmanager "build-tools;33.0.2" "platforms;android-33"
        echo '✅ Build Tools installed'
    
    - name: Replace system Gradle with 7.6.4
      run: |
        echo '🔧 Installing Gradle 7.6.4...'
        sudo rm -rf /usr/share/gradle*
        wget -q https://services.gradle.org/distributions/gradle-7.6.4-bin.zip -O /tmp/gradle.zip
        sudo unzip -q /tmp/gradle.zip -d /opt/
        sudo ln -sf /opt/gradle-7.6.4/bin/gradle /usr/bin/gradle
        sudo ln -sf /opt/gradle-7.6.4/bin/gradle /usr/local/bin/gradle
        echo "GRADLE_HOME=/opt/gradle-7.6.4" >> $GITHUB_ENV
        echo "/opt/gradle-7.6.4/bin" >> $GITHUB_PATH
        gradle --version
    
    - name: Install Cordova CLI
      run: npm install -g cordova@12
    
    - name: Install project dependencies
      working-directory: cordova-app
      run: npm install
    
    - name: Install Cordova Plugins
      working-directory: cordova-app
      run: |
        echo '🔌 Installing Cordova plugins...'
        cordova plugin add cordova-plugin-splashscreen@6.0.2 --save
        cordova plugin add cordova-plugin-googleplus@8.5.2 --save \
          --variable WEB_APPLICATION_CLIENT_ID="586936149662-ja0tlfjfinl2sl17j9ntp3m1avnf3dhn.apps.googleusercontent.com" \
          --variable REVERSED_CLIENT_ID="com.googleusercontent.apps.586936149662-ja0tlfjfinl2sl17j9ntp3m1avnf3dhn" \
          --variable PLAY_SERVICES_VERSION="20.7.0"
    
    - name: Setup Fixed Debug Keystore
      run: |
        echo '🔑 Using fixed debug keystore for consistent SHA-1...'
        mkdir -p ~/.android
        cp cordova-app/keystores/debug.keystore ~/.android/debug.keystore
        echo '=================================================='
        echo 'FIXED SHA-1 (already registered in Google Cloud Console):'
        echo 'SHA1: B3:DC:1A:86:7C:AC:0C:7D:E2:1B:80:46:3D:49:5D:5C:BB:32:E0:A5'
        echo '=================================================='
        echo 'Package name: io.accessnetwork.app'
        echo '=================================================='

    - name: Add Android platform (cordova-android 12.0.1)
      working-directory: cordova-app
      env:
        CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-7.6.4-bin.zip
      run: |
        echo '📱 Adding Android platform 12.0.1...'
        cordova platform remove android 2>/dev/null || true
        cordova platform add android@12.0.1 --verbose
        echo '✅ Android platform added'
    
    - name: Fix play-services-identity version in plugin
      working-directory: cordova-app
      run: |
        echo '🔧 Fixing play-services-identity version...'
        find platforms/android -name "*.gradle" -exec sed -i 's/play-services-identity:20\.7\.0/play-services-identity:18.1.0/g' {} \;
        find platforms/android -name "*.gradle" -exec sed -i 's/play-services-identity:\$\{PLAY_SERVICES_VERSION\}/play-services-identity:18.1.0/g' {} \;
        echo '✅ Fixed play-services-identity version'
    
    - name: Force compatible dependency versions
      working-directory: cordova-app
      run: |
        echo '🔧 Fixing library conflicts...'
        echo "" >> platforms/android/build.gradle
        echo "// Force compatible versions for SDK 33 and cordova-android 12" >> platforms/android/build.gradle
        echo "subprojects {" >> platforms/android/build.gradle
        echo "    afterEvaluate { project ->" >> platforms/android/build.gradle
        echo "        if (project.hasProperty('android')) {" >> platforms/android/build.gradle
        echo "            project.android {" >> platforms/android/build.gradle
        echo "                compileSdkVersion 33" >> platforms/android/build.gradle
        echo "            }" >> platforms/android/build.gradle
        echo "        }" >> platforms/android/build.gradle
        echo "    }" >> platforms/android/build.gradle
        echo "    configurations.all {" >> platforms/android/build.gradle
        echo "        resolutionStrategy {" >> platforms/android/build.gradle
        echo "            force 'androidx.core:core:1.9.0'" >> platforms/android/build.gradle
        echo "            force 'androidx.core:core-ktx:1.9.0'" >> platforms/android/build.gradle
        echo "            force 'androidx.appcompat:appcompat:1.6.1'" >> platforms/android/build.gradle
        echo "            force 'org.jetbrains.kotlin:kotlin-stdlib:1.7.22'" >> platforms/android/build.gradle
        echo "            force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.7.22'" >> platforms/android/build.gradle
        echo "            force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.7.22'" >> platforms/android/build.gradle
        echo "            force 'com.google.android.gms:play-services-auth:20.7.0'" >> platforms/android/build.gradle
        echo "            force 'com.google.android.gms:play-services-identity:18.1.0'" >> platforms/android/build.gradle
        echo "            force 'com.google.android.gms:play-services-base:18.2.0'" >> platforms/android/build.gradle
        echo "        }" >> platforms/android/build.gradle
        echo "    }" >> platforms/android/build.gradle
        echo "}" >> platforms/android/build.gradle
        echo '✅ Library conflicts fixed'
    
    - name: Build Debug APK
      working-directory: cordova-app
      env:
        CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-7.6.4-bin.zip
      run: |
        echo '🚧 Building Debug APK...'
        cordova build android --debug --verbose
        echo '✅ Debug APK built'
    
    - name: Build Release APK
      working-directory: cordova-app
      env:
        CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-7.6.4-bin.zip
      run: |
        echo '🚧 Building Release APK...'
        cordova build android --release --buildConfig=build.json --verbose
        echo '✅ Release APK built'
    
    - name: List APK files
      run: |
        echo "📱 Generated APK files:"
        find cordova-app/platforms/android -name "*.apk" -type f 2>/dev/null || echo "No APK found"
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: access-network-debug-apk
        path: cordova-app/platforms/android/app/build/outputs/apk/debug/*.apk
        if-no-files-found: warn
        retention-days: 30
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: access-network-release-apk
        path: cordova-app/platforms/android/app/build/outputs/apk/release/*.apk
        if-no-files-found: warn
        retention-days: 30
