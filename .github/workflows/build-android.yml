name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'cordova-app/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: cordova-app/package-lock.json
    
    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Accept Android SDK Licenses
      run: yes | sdkmanager --licenses || true
    
    - name: Install Android Build Tools and SDK 33+34
      run: |
        echo '📦 Installing Build Tools and SDK...'
        sdkmanager "build-tools;33.0.2" "build-tools;34.0.0" "platforms;android-33" "platforms;android-34"
        echo '✅ Build Tools installed'
    
    - name: Replace system Gradle with 7.6.4
      run: |
        echo '🔧 Installing Gradle 7.6.4...'
        sudo rm -rf /usr/share/gradle*
        wget -q https://services.gradle.org/distributions/gradle-7.6.4-bin.zip -O /tmp/gradle.zip
        sudo unzip -q /tmp/gradle.zip -d /opt/
        sudo ln -sf /opt/gradle-7.6.4/bin/gradle /usr/bin/gradle
        sudo ln -sf /opt/gradle-7.6.4/bin/gradle /usr/local/bin/gradle
        echo "GRADLE_HOME=/opt/gradle-7.6.4" >> $GITHUB_ENV
        echo "/opt/gradle-7.6.4/bin" >> $GITHUB_PATH
        gradle --version
    
    - name: Install Cordova CLI
      run: npm install -g cordova@12
    
    - name: Install project dependencies
      working-directory: cordova-app
      run: npm install
    
    - name: Install Cordova Plugins (without local-notification)
      working-directory: cordova-app
      run: |
        echo '🔌 Installing Cordova plugins...'
        cordova plugin add cordova-plugin-splashscreen@6.0.2 --save
        cordova plugin add cordova-plugin-googleplus@8.5.2 --save \
          --variable WEB_APPLICATION_CLIENT_ID="586936149662-ja0tlfjfinl2sl17j9ntp3m1avnf3dhn.apps.googleusercontent.com" \
          --variable REVERSED_CLIENT_ID="com.googleusercontent.apps.586936149662-ja0tlfjfinl2sl17j9ntp3m1avnf3dhn" \
          --variable PLAY_SERVICES_VERSION="20.7.0"
        echo '🔥 Installing Firebase Cloud Messaging plugin (latest with Android 12 fix)...'
        cordova plugin add cordova-plugin-firebase-messaging@7.0.2 --save
        echo '📢 AdMob plugin (cordova-plugin-ads) will be installed from config.xml during platform add'
        echo '🔔 Removing local-notification plugin to avoid SDK compatibility issues...'
        cordova plugin remove cordova-plugin-local-notification 2>/dev/null || true
    
    - name: Setup Release Keystore for Signing
      run: |
        echo '🔑 Setting up release keystore...'
        mkdir -p ~/.android
        # Copy debug keystore
        cp cordova-app/keystores/debug.keystore ~/.android/debug.keystore
        # Copy release keystore to cordova-app directory
        echo '=================================================='
        echo 'Release Keystore SHA-1 (register this in Google Cloud Console):'
        keytool -list -v -keystore cordova-app/access-network.keystore -alias access-network -storepass Access2026Secure 2>/dev/null | grep SHA1 || true
        echo '=================================================='
        echo 'Package name: io.accessnetwork.app'
        echo '=================================================='

    - name: Add Android platform (cordova-android 12.0.1)
      working-directory: cordova-app
      env:
        CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-7.6.4-bin.zip
      run: |
        echo '📱 Adding Android platform 12.0.1...'
        cordova platform remove android 2>/dev/null || true
        cordova platform add android@12.0.1 --verbose
        echo '✅ Android platform added'
    
    - name: Copy google-services.json for Firebase
      working-directory: cordova-app
      run: |
        echo '🔥 Copying google-services.json for Firebase...'
        cp google-services.json platforms/android/app/google-services.json
        echo '✅ google-services.json copied to platforms/android/app/'

    - name: Remove local-notification from platform
      working-directory: cordova-app
      run: |
        echo '🔧 Removing local-notification plugin from platform...'
        rm -rf platforms/android/app/src/main/java/de/appplant 2>/dev/null || true
        echo '✅ Removed local-notification'
    
    - name: Fix play-services-identity version in plugin
      working-directory: cordova-app
      run: |
        echo '🔧 Fixing play-services-identity version...'
        find platforms/android -name "*.gradle" -exec sed -i 's/play-services-identity:20\.7\.0/play-services-identity:18.1.0/g' {} \;
        find platforms/android -name "*.gradle" -exec sed -i 's/play-services-identity:\$\{PLAY_SERVICES_VERSION\}/play-services-identity:18.1.0/g' {} \;
        echo '✅ Fixed play-services-identity version'

    - name: Fix AdMob APPLICATION_ID in AndroidManifest
      working-directory: cordova-app
      run: |
        echo '🔧 Fixing AdMob APPLICATION_ID in AndroidManifest...'
        MANIFEST="platforms/android/app/src/main/AndroidManifest.xml"
        if [ -f "$MANIFEST" ]; then
          # cordova-plugin-ads hardcodes the developer's APP_ID in plugin.xml
          # Replace it with our test app ID (change to production when ready)
          sed -i 's/ca-app-pub-4029587076166791~9642866395/ca-app-pub-3940256099942544~3347511713/g' "$MANIFEST"
          
          # Remove duplicate meta-data and activity entries (multi-line XML blocks)
          echo '🔧 Removing duplicate manifest entries...'
          echo "Before fix:" && grep -c 'APPLICATION_ID' "$MANIFEST" && echo 'APPLICATION_ID occurrences'
          # Use perl to remove duplicate multi-line meta-data blocks
          perl -0777 -i -pe '
            # Remove duplicate APPLICATION_ID meta-data (keep first)
            my $pat1 = qr/(\s*<meta-data\s+android:name="com\.google\.android\.gms\.ads\.APPLICATION_ID"\s+android:value="[^"]*"\s*\/>)/s;
            if (($_ =~ m/$pat1/g) && ($_ =~ m/$pat1/g)) {
              $_ =~ s/(.*?$pat1)(.*?)$pat1/$1$2/s;
            }
            # Remove duplicate DELAY_APP_MEASUREMENT_INIT meta-data (keep first)
            my $pat2 = qr/(\s*<meta-data\s+android:name="com\.google\.android\.gms\.ads\.DELAY_APP_MEASUREMENT_INIT"\s+android:value="[^"]*"\s*\/>)/s;
            if (($_ =~ m/$pat2/g) && ($_ =~ m/$pat2/g)) {
              $_ =~ s/(.*?$pat2)(.*?)$pat2/$1$2/s;
            }
            # Remove duplicate AdActivity (keep first)
            my $pat3 = qr/(\s*<activity[^>]*android:name="com\.google\.android\.gms\.ads\.AdActivity"[^>]*\/>)/s;
            if (($_ =~ m/$pat3/g) && ($_ =~ m/$pat3/g)) {
              $_ =~ s/(.*?$pat3)(.*?)$pat3/$1$2/s;
            }
          ' "$MANIFEST"
          echo "After fix:" && grep -c 'APPLICATION_ID' "$MANIFEST" && echo 'APPLICATION_ID occurrences'
          grep -n 'APPLICATION_ID' "$MANIFEST" || true
        fi

    - name: Fix AndroidManifest for background retention
      working-directory: cordova-app
      run: |
        echo '🔧 Patching AndroidManifest.xml for background retention...'
        MANIFEST="platforms/android/app/src/main/AndroidManifest.xml"
        if [ -f "$MANIFEST" ]; then
          # Add alwaysRetainTaskState and clearTaskOnLaunch to MainActivity
          sed -i 's/<activity\s\+android:name="MainActivity"/<activity android:name="MainActivity" android:alwaysRetainTaskState="true" android:clearTaskOnLaunch="false"/' "$MANIFEST"
          if ! grep -q 'alwaysRetainTaskState' "$MANIFEST"; then
            sed -i '/<activity.*MainActivity/s/android:name/android:alwaysRetainTaskState="true" android:clearTaskOnLaunch="false" android:name/' "$MANIFEST"
          fi
          grep -q 'alwaysRetainTaskState' "$MANIFEST" && echo '✅ alwaysRetainTaskState added' || echo '⚠️ Could not add'
          grep -q 'clearTaskOnLaunch' "$MANIFEST" && echo '✅ clearTaskOnLaunch added' || echo '⚠️ Could not add'
          echo '📋 Patched MainActivity entry:'
          grep -n 'MainActivity' "$MANIFEST" || true
        fi
    
    - name: Force compatible dependency versions
      working-directory: cordova-app
      run: |
        echo '🔧 Fixing library conflicts...'
        cat >> platforms/android/build.gradle << 'GRADLE_CONFIG'
        
        // Force compatible versions for SDK 34 and cordova-android 12
        // Solution from: https://stackoverflow.com/questions/79408107
        allprojects {
            configurations.all {
                // Exclude error_prone_annotations to fix D8 dexing NullPointerException
                exclude group: "com.google.errorprone", module: "error_prone_annotations"
            }
        }
        
        subprojects {
            afterEvaluate { project ->
                if (project.hasProperty('android')) {
                    project.android {
                        compileSdkVersion 34
                    }
                }
            }
            configurations.all {
                resolutionStrategy {
                    force 'androidx.core:core:1.12.0'
                    force 'androidx.core:core-ktx:1.12.0'
                    force 'androidx.appcompat:appcompat:1.6.1'
                    force 'org.jetbrains.kotlin:kotlin-stdlib:1.7.22'
                    force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.7.22'
                    force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.7.22'
                    force 'com.google.android.gms:play-services-auth:20.7.0'
                    force 'com.google.android.gms:play-services-identity:18.1.0'
                    force 'com.google.android.gms:play-services-base:18.3.0'
                    force 'com.google.android.gms:play-services-basement:18.3.0'
                    force 'com.google.android.gms:play-services-ads:22.3.0'
                    force 'com.google.android.gms:play-services-ads-lite:22.3.0'
                }
            }
        }
        GRADLE_CONFIG
        echo '✅ Library conflicts fixed (error_prone_annotations excluded)'
    
    - name: Build Debug APK
      working-directory: cordova-app
      env:
        CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-7.6.4-bin.zip
      run: |
        echo '🚧 Building Debug APK...'
        cordova build android --debug --verbose
        echo '✅ Debug APK built'
    
    - name: Build Release APK (Signed)
      working-directory: cordova-app
      env:
        CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-7.6.4-bin.zip
      run: |
        echo '🚧 Building Signed Release APK...'
        echo '📋 Using keystore: access-network.keystore'
        # Verify keystore exists
        ls -la access-network.keystore
        # Build APK (not AAB) with packageType flag
        cordova build android --release --buildConfig=build.json -- --packageType=apk --verbose
        echo '✅ Release APK built and signed'
        # Verify the APK was created
        echo '📱 Checking output files:'
        find platforms/android -name "*.apk" -o -name "*.aab" -type f 2>/dev/null | head -10
    
    - name: List APK files
      run: |
        echo "📱 Generated APK files:"
        find cordova-app/platforms/android -name "*.apk" -type f 2>/dev/null || echo "No APK found"
        echo "📦 Generated AAB files:"
        find cordova-app/platforms/android -name "*.aab" -type f 2>/dev/null || echo "No AAB found"
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: access-network-debug-apk
        path: cordova-app/platforms/android/app/build/outputs/apk/debug/*.apk
        if-no-files-found: warn
        retention-days: 30
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: access-network-release-apk
        path: cordova-app/platforms/android/app/build/outputs/apk/release/*.apk
        if-no-files-found: warn
        retention-days: 30
    
    - name: Upload Release AAB (for Google Play)
      uses: actions/upload-artifact@v4
      with:
        name: access-network-release-aab
        path: cordova-app/platforms/android/app/build/outputs/bundle/release/*.aab
        if-no-files-found: warn
        retention-days: 30

