    #     security import certificate.p12 -k build.keychain -P "$IOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
    #     security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
    #     security default-keychain -s build.keychain
    #     security unlock-keychain -p "" build.keychain
    #
    # - name: Import Provisioning Profile
    #   env:
    #     IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
    #   run: |
    #     mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
    #     echo "$IOS_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
    #
    # - name: Build Signed Release IPA
    #   working-directory: cordova-app
    #   run: |
    #     cordova build ios --release --device --buildConfig=build.json
    #
    # - name: Upload Release IPA
    #   uses: actions/upload-artifact@v4
    #   with:
    #     name: access-network-ios-ipa
    #     path: cordova-app/platforms/ios/build/device/*.ipa
    #     retention-days: 30

    - name: Upload Simulator Build (for Appetize.io)
      uses: actions/upload-artifact@v4
      with:
        name: access-network-ios-simulator
        path: |
          cordova-app/output-simulator/
          cordova-app/AccessNetwork-Simulator.zip
        if-no-files-found: warn
        retention-days: 30

    - name: Upload Device Build (for signing)
      uses: actions/upload-artifact@v4
      with:
        name: access-network-ios-device
        path: cordova-app/output-device/
        if-no-files-found: warn
        retention-days: 30
