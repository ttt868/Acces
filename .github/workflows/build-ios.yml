name: Build iOS App

on:
  push:
    branches: [ main ]
    paths:
      - 'cordova-app/**'
      - '.github/workflows/build-ios.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.4'
    
    - name: Install CocoaPods
      run: |
        echo '📦 Installing CocoaPods...'
        sudo gem install cocoapods
        pod --version
        echo '✅ CocoaPods installed'
    
    - name: Install Cordova CLI
      run: npm install -g cordova@12
    
    - name: Install project dependencies
      working-directory: cordova-app
      run: npm install
    
    - name: Generate iOS icon sizes from source
      working-directory: cordova-app
      run: |
        echo '🖼️ Generating all required iOS icon sizes...'
        # Use the same icon as Android: test-icon.jpg (1024x1024)
        SOURCE="www/test-icon.jpg"
        if [ ! -f "$SOURCE" ]; then
          echo "⚠️ test-icon.jpg not found, falling back to access-store-512.png"
          SOURCE="www/access-store-512.png"
        fi
        if [ ! -f "$SOURCE" ]; then
          SOURCE="www/access-store.png"
        fi
        
        mkdir -p res/ios-icons
        
        # Convert JPEG source to PNG first (iOS requires PNG icons)
        sips -s format png "$SOURCE" --out "res/ios-icons/source-1024.png" > /dev/null 2>&1
        PNG_SOURCE="res/ios-icons/source-1024.png"
        
        # Generate all iOS required icon sizes from the PNG source
        for SIZE in 20 29 40 58 60 76 80 87 120 152 167 180 1024; do
          sips -z $SIZE $SIZE "$PNG_SOURCE" --out "res/ios-icons/icon-${SIZE}.png" > /dev/null 2>&1
          echo "  ✅ icon-${SIZE}.png"
        done
        
        echo '✅ All iOS icons generated'
        ls -la res/ios-icons/
    
    - name: Install Cordova Plugins for iOS
      working-directory: cordova-app
      run: |
        echo '🔌 Installing Cordova plugins for iOS...'
        
        # Splash screen
        cordova plugin add cordova-plugin-splashscreen@6.0.2 --save 2>/dev/null || true
        
        # Google Sign-In (iOS Client ID with correct REVERSED_CLIENT_ID for URL scheme)
        cordova plugin add cordova-plugin-googleplus@8.5.2 --save \
          --variable WEB_APPLICATION_CLIENT_ID="586936149662-ja0tlfjfinl2sl17j9ntp3m1avnf3dhn.apps.googleusercontent.com" \
          --variable REVERSED_CLIENT_ID="com.googleusercontent.apps.586936149662-db8i44p15dimn36g27sp78gb698cbthc" \
          2>/dev/null || true
        
        # Firebase Cloud Messaging
        cordova plugin add cordova-plugin-firebase-messaging@7.0.2 --save 2>/dev/null || true
        
        # AdMob - cordova-plugin-ads (test App ID for now)
        cordova plugin add cordova-plugin-ads@2.0.5 --save \
          --variable ADMOB_IOS_APP_ID="ca-app-pub-3940256099942544~1458002511" \
          2>/dev/null || true
        
        # Biometric (Face ID / Touch ID)
        cordova plugin add cordova-plugin-fingerprint-aio@5.0.1 --save \
          --variable FACEID_USAGE_DESCRIPTION="Access Network uses Face ID to unlock the app securely" \
          2>/dev/null || true
        
        # Skip android-permissions (Android only)
        echo '⏭️ Skipping cordova-plugin-android-permissions (Android only)'
        
        echo '✅ All plugins installed'
    
    - name: Fix pod version conflicts before platform add
      working-directory: cordova-app
      run: |
        echo '🔧 Fixing pod versions for iOS compatibility...'
        
        # cordova-plugin-googleplus requires GoogleSignIn ~> 5.0.2 (v5 API)
        # cordova-plugin-firebase-messaging defaults to Firebase 9.x which conflicts
        # Solution: Force Firebase to 8.x which is compatible with GoogleSignIn 5.x
        
        # Fix firebase-messaging plugin to use Firebase 8.x (compatible with GoogleSignIn 5)
        FCM_PLUGIN="plugins/cordova-plugin-firebase-messaging/plugin.xml"
        if [ -f "$FCM_PLUGIN" ]; then
          # Change Firebase pod version to 8.x (last version compatible with GoogleSignIn 5)
          sed -i '' 's|spec="$IOS_FIREBASE_POD_VERSION"|spec="~> 8.15.0"|g' "$FCM_PLUGIN"
          # Also change any hardcoded 9.x or 10.x to 8.15
          perl -pi -e 's/Firebase\/Messaging.*?spec="[^"]*"/Firebase\/Messaging" spec="~> 8.15.0"/g' "$FCM_PLUGIN"
          perl -pi -e 's/Firebase\/Analytics.*?spec="[^"]*"/Firebase\/Analytics" spec="~> 8.15.0"/g' "$FCM_PLUGIN"
          echo '✅ Firebase pod version set to ~> 8.15.0'
          grep -n 'pod name.*Firebase' "$FCM_PLUGIN" || true
        fi
        
        # Also fix firebase-analytics plugin
        ANALYTICS_PLUGIN="plugins/cordova-plugin-firebase-analytics/plugin.xml"
        if [ -f "$ANALYTICS_PLUGIN" ]; then
          perl -pi -e 's/Firebase\/Analytics.*?spec="[^"]*"/Firebase\/Analytics" spec="~> 8.15.0"/g' "$ANALYTICS_PLUGIN"
          echo '✅ Firebase Analytics pod version set to ~> 8.15.0'
        fi
        
        # Fix GoogleUtilities version conflict:
        # googleplus plugin pins GoogleUtilities to ~> 7.2.2 (max 7.2.x)
        # but Firebase 8.15 needs GoogleUtilities ~> 7.7
        # Solution: Relax GoogleUtilities to ~> 7.7 (compatible with both)
        GP_PLUGIN="plugins/cordova-plugin-googleplus/plugin.xml"
        if [ -f "$GP_PLUGIN" ]; then
          sed -i '' 's|GoogleUtilities" spec="~> 7.2.2"|GoogleUtilities" spec="~> 7.7"|g' "$GP_PLUGIN"
          echo '✅ GoogleUtilities version relaxed to ~> 7.7'
          grep -n 'GoogleUtilities' "$GP_PLUGIN" || true
        fi
        
        echo '📋 GoogleSignIn version in googleplus plugin:'
        grep -n 'GoogleSignIn' plugins/cordova-plugin-googleplus/plugin.xml || true
    
    - name: Add iOS platform (allow pod install to fail, we fix it later)
      working-directory: cordova-app
      run: |
        echo '📱 Adding iOS platform (cordova-ios 7.1.1)...'
        cordova platform remove ios 2>/dev/null || true
        # Platform add may fail during pod install due to version conflicts
        # We'll fix and re-run pod install in the next step
        cordova platform add ios@7.1.1 2>&1 || {
          echo '⚠️ Platform add had issues (likely CocoaPods), will fix in next step...'
          # Check if the platform directory was actually created
          if [ -d "platforms/ios" ]; then
            echo '✅ iOS platform directory exists, continuing...'
          else
            echo '❌ iOS platform directory not created, retrying without pods...'
            exit 1
          fi
        }
        echo '✅ iOS platform step completed'
    
    - name: Fix CocoaPods Podfile and resolve conflicts
      working-directory: cordova-app/platforms/ios
      run: |
        echo '🔧 Fixing Podfile for compatible pod versions...'
        
        if [ ! -f "Podfile" ]; then
          echo '❌ No Podfile found'
          exit 1
        fi
        
        # Remove stale lock file to allow fresh resolution
        rm -f Podfile.lock
        
        # Check current Podfile
        echo '📋 Current Podfile:'
        cat Podfile
        echo ''
        
        # Fix GoogleSignIn version in Podfile if needed (keep 5.x for plugin compatibility)
        # GoogleSignIn 5.x is required because cordova-plugin-googleplus uses v5 delegate API
        
        # Force Firebase to 8.x (compatible with GoogleSignIn 5.x and GoogleUtilities 7.x)
        sed -i '' "s|pod 'Firebase/Messaging', '~> 9.[0-9.]*'|pod 'Firebase/Messaging', '~> 8.15.0'|g" Podfile
        sed -i '' "s|pod 'Firebase/Messaging', '~> 10.[0-9.]*'|pod 'Firebase/Messaging', '~> 8.15.0'|g" Podfile
        sed -i '' "s|pod 'Firebase/Analytics', '~> 9.[0-9.]*'|pod 'Firebase/Analytics', '~> 8.15.0'|g" Podfile
        sed -i '' "s|pod 'Firebase/Analytics', '~> 10.[0-9.]*'|pod 'Firebase/Analytics', '~> 8.15.0'|g" Podfile
        
        # Fix GoogleUtilities version (must be ~> 7.7 to work with Firebase 8.15)
        sed -i '' "s|pod 'GoogleUtilities', '~> 7.2.2'|pod 'GoogleUtilities', '~> 7.7'|g" Podfile
        
        # ✅ CRITICAL: Add post_install hook to exclude arm64 from ALL simulator targets
        # macOS-14 runners are Apple Silicon (arm64). Without this, CocoaPods dynamic
        # frameworks are built for arm64 only, but Appetize.io needs x86_64 simulator.
        # This ensures ALL targets (pods + app) build for x86_64 simulator.
        if ! grep -q "EXCLUDED_ARCHS" Podfile; then
          cat >> Podfile << 'POSTINSTALL'

post_install do |installer|
  installer.pods_project.targets.each do |target|
    target.build_configurations.each do |config|
      config.build_settings['EXCLUDED_ARCHS[sdk=iphonesimulator*]'] = 'arm64'
    end
  end
end
POSTINSTALL
          echo '✅ Added post_install hook to exclude arm64 from simulator pods'
        else
          echo '✅ EXCLUDED_ARCHS already in Podfile'
        fi
        
        echo '📋 Fixed Podfile:'
        cat Podfile
        echo ''
        
        # Fresh pod install
        echo '📦 Running pod install with fresh resolution...'
        pod install --repo-update 2>&1 | tail -30
        
        # Verify Podfile.lock was created
        if [ -f "Podfile.lock" ]; then
          echo '✅ Podfile.lock created'
          echo '📋 Installed pods:'
          grep '  - ' Podfile.lock | head -20
        else
          echo '❌ Podfile.lock NOT created - pod install failed'
          exit 1
        fi
        
        echo '✅ CocoaPods resolved successfully'
    
    - name: Copy GoogleService-Info.plist
      working-directory: cordova-app
      run: |
        echo '🔥 Copying GoogleService-Info.plist for Firebase iOS...'
        
        # Copy to platforms/ios/ root (where cordova-plugin-firebase-messaging references it in Xcode project)
        cp GoogleService-Info.plist platforms/ios/GoogleService-Info.plist
        echo "✅ Copied to: platforms/ios/GoogleService-Info.plist (Xcode project reference)"
        
        # Also copy to the app directory (as fallback)
        PLIST_DEST=$(find platforms/ios -maxdepth 2 -name "Access Network" -type d | head -1)
        if [ -z "$PLIST_DEST" ]; then
          PLIST_DEST=$(find platforms/ios -maxdepth 2 -name "Access*" -type d ! -name "*.xcworkspace" ! -name "*.xcodeproj" | head -1)
        fi
        if [ -n "$PLIST_DEST" ]; then
          cp GoogleService-Info.plist "$PLIST_DEST/GoogleService-Info.plist"
          echo "✅ Also copied to: $PLIST_DEST/GoogleService-Info.plist"
        fi
        
        echo "📂 GoogleService-Info.plist locations:"
        find platforms/ios -name "GoogleService-Info.plist" -type f
    
    - name: Verify iOS icons in platform
      working-directory: cordova-app
      run: |
        echo '🖼️ Verifying iOS icons were correctly placed by Cordova...'
        IOS_ICONS_DIR=$(find platforms/ios -path "*/Assets.xcassets/AppIcon.appiconset" -type d | head -1)
        
        if [ -n "$IOS_ICONS_DIR" ]; then
          echo "Icons directory: $IOS_ICONS_DIR"
          ls -la "$IOS_ICONS_DIR/" | head -20
          
          # Check Contents.json references the icons
          if [ -f "$IOS_ICONS_DIR/Contents.json" ]; then
            echo '📋 Contents.json icon entries:'
            grep -o '"filename"[^,]*' "$IOS_ICONS_DIR/Contents.json" | head -15
          fi
          
          # Fallback: if Cordova didn't copy icons properly, copy manually and update Contents.json
          ICON_COUNT=$(find "$IOS_ICONS_DIR" -name "*.png" | wc -l)
          if [ "$ICON_COUNT" -lt 5 ]; then
            echo "⚠️ Only $ICON_COUNT icons found, copying manually..."
            for SIZE in 20 29 40 58 60 76 80 87 120 152 167 180 1024; do
              if [ -f "res/ios-icons/icon-${SIZE}.png" ]; then
                cp "res/ios-icons/icon-${SIZE}.png" "$IOS_ICONS_DIR/icon-${SIZE}.png"
              fi
            done
            # Generate proper Contents.json for Xcode
            printf '%s\n' '{"images":[' '{"filename":"icon-1024.png","idiom":"universal","platform":"ios","size":"1024x1024"},' '{"filename":"icon-20.png","idiom":"iphone","scale":"2x","size":"20x20"},' '{"filename":"icon-60.png","idiom":"iphone","scale":"3x","size":"20x20"},' '{"filename":"icon-58.png","idiom":"iphone","scale":"2x","size":"29x29"},' '{"filename":"icon-87.png","idiom":"iphone","scale":"3x","size":"29x29"},' '{"filename":"icon-80.png","idiom":"iphone","scale":"2x","size":"40x40"},' '{"filename":"icon-120.png","idiom":"iphone","scale":"3x","size":"40x40"},' '{"filename":"icon-120.png","idiom":"iphone","scale":"2x","size":"60x60"},' '{"filename":"icon-180.png","idiom":"iphone","scale":"3x","size":"60x60"},' '{"filename":"icon-40.png","idiom":"ipad","scale":"1x","size":"20x20"},' '{"filename":"icon-40.png","idiom":"ipad","scale":"2x","size":"20x20"},' '{"filename":"icon-29.png","idiom":"ipad","scale":"1x","size":"29x29"},' '{"filename":"icon-58.png","idiom":"ipad","scale":"2x","size":"29x29"},' '{"filename":"icon-40.png","idiom":"ipad","scale":"1x","size":"40x40"},' '{"filename":"icon-80.png","idiom":"ipad","scale":"2x","size":"40x40"},' '{"filename":"icon-76.png","idiom":"ipad","scale":"1x","size":"76x76"},' '{"filename":"icon-152.png","idiom":"ipad","scale":"2x","size":"76x76"},' '{"filename":"icon-167.png","idiom":"ipad","scale":"2x","size":"83.5x83.5"},' '{"filename":"icon-1024.png","idiom":"ios-marketing","scale":"1x","size":"1024x1024"}' '],"info":{"author":"xcode","version":1}}' > "$IOS_ICONS_DIR/Contents.json"
            echo '✅ Contents.json regenerated with correct icon references'
          else
            echo "✅ $ICON_COUNT icons found - looks good"
          fi
        else
          echo '⚠️ Could not find AppIcon.appiconset directory'
          find platforms/ios -name "*.appiconset" -type d 2>/dev/null || true
        fi

    - name: Fix AdMob iOS App ID in Info.plist
      working-directory: cordova-app
      run: |
        echo '🔧 Fixing AdMob App ID for iOS...'
        # Find the MAIN APP Info.plist (not CordovaLib, not Pods, not Frameworks)
        APP_PLIST=$(find platforms/ios -maxdepth 3 -name "*-Info.plist" ! -path "*/Pods/*" ! -path "*/CordovaLib/*" | head -1)
        if [ -z "$APP_PLIST" ]; then
          # Fallback: look for Info.plist in the app directory specifically
          APP_PLIST=$(find platforms/ios -path "*/Access Network/Info.plist" | head -1)
        fi
        if [ -z "$APP_PLIST" ]; then
          # Last resort: any Info.plist not in CordovaLib/Pods/Frameworks
          APP_PLIST=$(find platforms/ios -maxdepth 3 -name "Info.plist" ! -path "*/Pods/*" ! -path "*/Frameworks/*" ! -path "*/CordovaLib/*" | head -1)
        fi
        if [ -n "$APP_PLIST" ]; then
          echo "Main app Info.plist: $APP_PLIST"
          # Set GADApplicationIdentifier (try Set first, then Add if key doesn't exist)
          /usr/libexec/PlistBuddy -c "Set :GADApplicationIdentifier ca-app-pub-3940256099942544~1458002511" "$APP_PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :GADApplicationIdentifier string ca-app-pub-3940256099942544~1458002511" "$APP_PLIST" 2>/dev/null || true
          # Delay AdMob measurement init to prevent early crash
          /usr/libexec/PlistBuddy -c "Set :GADDelayAppMeasurementInit bool true" "$APP_PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :GADDelayAppMeasurementInit bool true" "$APP_PLIST" 2>/dev/null || true
          # Disable Firebase AppDelegate proxy (prevents swizzling conflicts with cordova-ios 7.x)
          /usr/libexec/PlistBuddy -c "Set :FirebaseAppDelegateProxyEnabled bool false" "$APP_PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :FirebaseAppDelegateProxyEnabled bool false" "$APP_PLIST" 2>/dev/null || true
          echo "✅ AdMob, Firebase plist entries fixed"
          echo "Verifying..."
          /usr/libexec/PlistBuddy -c "Print :GADApplicationIdentifier" "$APP_PLIST" 2>/dev/null || echo "⚠️ GADApplicationIdentifier not set"
          /usr/libexec/PlistBuddy -c "Print :GADDelayAppMeasurementInit" "$APP_PLIST" 2>/dev/null || echo "⚠️ GADDelayAppMeasurementInit not set"
          /usr/libexec/PlistBuddy -c "Print :FirebaseAppDelegateProxyEnabled" "$APP_PLIST" 2>/dev/null || echo "⚠️ FirebaseAppDelegateProxyEnabled not set"
        else
          echo "⚠️ Could not find main Info.plist"
          find platforms/ios -name "Info.plist" -type f | head -10
        fi

    - name: Build iOS (No Code Signing - Unsigned)
      working-directory: cordova-app
      run: |
        echo '🚧 Building iOS (unsigned - no code signing)...'
        
        # Use the CocoaPods-generated .xcworkspace (NOT the one inside .xcodeproj)
        WORKSPACE=$(find platforms/ios -maxdepth 1 -name "*.xcworkspace" | head -1)
        SCHEME="Access Network"
        
        if [ -z "$WORKSPACE" ]; then
          WORKSPACE=$(find platforms/ios -name "*.xcworkspace" ! -path "*xcodeproj*" | head -1)
        fi
        
        if [ -z "$WORKSPACE" ]; then
          echo '⚠️ No standalone .xcworkspace found, looking for any...'
          WORKSPACE=$(find platforms/ios -name "*.xcworkspace" | head -1)
        fi
        
        echo "Using workspace: $WORKSPACE"
        echo "Scheme: $SCHEME"
        
        # Ensure pods are synced
        cd platforms/ios
        pod install 2>&1 | tail -10 || true
        cd ../..
        
        if [ -n "$WORKSPACE" ]; then
          # Build TWO versions:
          # 1. Simulator build (for Appetize.io testing) - exclude arm64 for GoogleSignIn 5.x compat
          # 2. Device build (for future signing/IPA)
          
          echo '📱 Building for SIMULATOR (x86_64 - for Appetize.io)...'
          set -o pipefail
          xcodebuild build \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -derivedDataPath build-simulator \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_ENTITLEMENTS="" \
            ONLY_ACTIVE_ARCH=NO \
            EXCLUDED_ARCHS='arm64' \
            2>&1 | tee /tmp/xcodebuild-sim.log | tail -80
          
          SIM_EXIT=${PIPESTATUS[0]}
          if [ $SIM_EXIT -eq 0 ]; then
            echo '✅ Simulator build completed successfully'
          else
            echo "❌ Simulator build failed with code $SIM_EXIT"
            grep -i "error:" /tmp/xcodebuild-sim.log | tail -20
          fi
          
          echo ''
          echo '📱 Building for DEVICE (arm64 - for IPA/signing)...'
          xcodebuild build \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build-device \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_ENTITLEMENTS="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tee /tmp/xcodebuild-dev.log | tail -80
          
          DEV_EXIT=${PIPESTATUS[0]}
          if [ $DEV_EXIT -eq 0 ]; then
            echo '✅ Device build completed successfully'
          else
            echo "⚠️ Device build failed (non-critical for testing)"
            grep -i "error:" /tmp/xcodebuild-dev.log | tail -10
          fi
          
          # At least one must succeed
          if [ $SIM_EXIT -ne 0 ] && [ $DEV_EXIT -ne 0 ]; then
            echo '❌ Both builds failed!'
            exit 1
          fi
        else
          echo '❌ No Xcode workspace/project found'
          find platforms/ios -maxdepth 3 -type d
          exit 1
        fi
    
    - name: Find and package build outputs
      working-directory: cordova-app
      run: |
        echo '📱 Searching for .app builds...'
        
        # Simulator build (for Appetize.io)
        SIM_APP=$(find build-simulator -name "Access Network.app" -type d 2>/dev/null | head -1)
        if [ -n "$SIM_APP" ]; then
          echo "✅ Simulator .app found: $SIM_APP"
          mkdir -p output-simulator
          cp -R "$SIM_APP" output-simulator/
          # Create a ready-to-upload zip for Appetize.io
          cd output-simulator
          zip -r ../AccessNetwork-Simulator.zip "Access Network.app"
          cd ..
          echo "📦 Simulator zip created:"
          ls -la AccessNetwork-Simulator.zip
        else
          echo '⚠️ No simulator .app found'
          find build-simulator -maxdepth 5 -name "*.app" -type d 2>/dev/null || echo 'Nothing in build-simulator'
        fi
        
        # Device build (for future signing)
        DEV_APP=$(find build-device -name "Access Network.app" -type d 2>/dev/null | head -1)
        if [ -n "$DEV_APP" ]; then
          echo "✅ Device .app found: $DEV_APP"
          mkdir -p output-device
          cp -R "$DEV_APP" output-device/
          echo "📦 Device build packaged"
          ls -la output-device/
        else
          echo '⚠️ No device .app found'
        fi
    
    # ============================================================
    # SIGNED BUILD (uncomment when Apple Developer account is ready)
    # ============================================================
    # To enable signed builds:
    # 1. Get Apple Developer account ($99/year)
    # 2. Create Distribution Certificate + Provisioning Profile
    # 3. Add these GitHub Secrets:
    #    - IOS_CERTIFICATE_P12: Base64 encoded .p12 certificate
    #    - IOS_CERTIFICATE_PASSWORD: Password for the .p12
    #    - IOS_PROVISIONING_PROFILE: Base64 encoded .mobileprovision
    #    - APPLE_TEAM_ID: Your Apple Developer Team ID
    #
