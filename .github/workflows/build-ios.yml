        echo "✅ LaunchScreen setup complete (minimal solid background)"

    - name: Ensure FirebaseApp.configure() runs early in AppDelegate
      working-directory: cordova-app
      run: |
        echo '🔥 Ensuring Firebase is configured in AppDelegate...'
        
        APPDELEGATE=$(find platforms/ios -name "AppDelegate.m" ! -path "*/Pods/*" ! -path "*/Plugins/*" | head -1)
        
        if [ -z "$APPDELEGATE" ]; then
          echo "⚠️ AppDelegate.m not found"
          find platforms/ios -name "AppDelegate*" -type f | head -10
          exit 0
        fi
        
        echo "Found: $APPDELEGATE"
        
        export APPDELEGATE_FILE="$APPDELEGATE"
        python3 << 'PYEOF'
        import re, os
        
        filepath = os.environ['APPDELEGATE_FILE']
        with open(filepath, 'r') as f:
            content = f.read()
        
        original = content
        
        # Step 1: Add @import Firebase after the last #import line
        if '@import Firebase' not in content:
            lines = content.split('\n')
            last_import_idx = -1
            for i, line in enumerate(lines):
                if line.strip().startswith('#import'):
                    last_import_idx = i
            if last_import_idx >= 0:
                lines.insert(last_import_idx + 1, '@import Firebase;')
                content = '\n'.join(lines)
                print('Added @import Firebase')
        
        # Step 2: Inject [FIRApp configure] into didFinishLaunchingWithOptions
        if '[FIRApp configure]' not in content:
            firebase_inject = '''
            // Firebase early init
            if (![FIRApp defaultApp]) {
                [FIRApp configure];
                NSLog(@"Firebase configured in AppDelegate");
            }'''
            # Find the opening { of didFinishLaunchingWithOptions
            pattern = r'(didFinishLaunchingWithOptions[^{]*\{)'
            match = re.search(pattern, content)
            if match:
                insert_pos = match.end()
                content = content[:insert_pos] + firebase_inject + content[insert_pos:]
                print('Injected [FIRApp configure] into didFinishLaunchingWithOptions')
            else:
                print('WARNING: didFinishLaunchingWithOptions not found')
        
        if content != original:
            with open(filepath, 'w') as f:
                f.write(content)
            print('AppDelegate.m patched successfully')
        else:
            print('No changes needed')
        PYEOF
        
        # Remove any conflicting category files
        find platforms/ios -name "AppDelegate+FirebaseInit.m" -delete 2>/dev/null || true
        
        echo "📋 AppDelegate.m key lines:"
        grep -n "import\|FIRApp\|didFinish" "$APPDELEGATE" | head -10
        echo "✅ Firebase init complete"

    # InAppBrowser plugin NOT installed - no native patch needed

    - name: Patch www/ files for iOS WKWebView compatibility
      working-directory: cordova-app
      run: |
        echo '🔧 Comprehensive iOS WKWebView patches (v5 - fix web process crash)...'
        
        python3 << 'PYEOF'
        import re, os, glob
        
        def patch_file(filepath):
            if not os.path.exists(filepath):
                print(f"  ⚠️ Not found: {filepath}")
                return
            print(f"\n  📝 Patching: {filepath}")
            with open(filepath, 'r', encoding='utf-8') as f:
                content = f.read()
            original_len = len(content)
            
            # ============================================
            # PHASE 1: Remove problematic meta tags
            # ============================================
            content = re.sub(r'<meta http-equiv="Cross-Origin-Embedder-Policy"[^>]*>\s*\n?', '', content)
            content = re.sub(r'<meta http-equiv="Cross-Origin-Opener-Policy"[^>]*>\s*\n?', '', content)
            content = re.sub(r'<meta http-equiv="Feature-Policy"[^>]*>\s*\n?', '', content)
            content = re.sub(r'<meta http-equiv="Permissions-Policy"[^>]*>\s*\n?', '', content)
            content = re.sub(r'<meta\s+name="monetag"[^>]*>\s*\n?', '', content)
            
            # ============================================
            # PHASE 2: Remove ALL crossorigin and integrity
            # ============================================
            content = re.sub(r'\s+crossorigin="[^"]*"', '', content)
            content = re.sub(r'\s+crossorigin(?=[>\s/])', '', content)
            content = re.sub(r'\s+integrity="[^"]*"', '', content)
            
            # ============================================
            # PHASE 3: Remove ALL external resources
            # ============================================
            # Preconnect links
            content = re.sub(r'<link\s+rel="preconnect"[^>]*>\s*\n?', '', content)
            # Google Fonts
            content = re.sub(r'<link[^>]*fonts\.googleapis\.com[^>]*>\s*\n?', '', content)
            # Font Awesome ALL versions from CDN
            content = re.sub(r'<link[^>]*font-awesome/6\.[^>]*/?>\s*\n?', '', content)
            content = re.sub(r'<link[^>]*cdnjs\.cloudflare\.com[^>]*/?>\s*\n?', '', content)
            # Manifest
            content = re.sub(r'<link\s+rel="manifest"[^>]*>\s*\n?', '', content)
            # ALL external CDN scripts
            content = re.sub(r'<script\s+src="https://[^"]*"[^>]*>\s*</script>\s*\n?', '', content)
            
            # ============================================
            # PHASE 4: CRITICAL - Fix CSS to show content WITHOUT JavaScript
            # The web process crashes before JS can run, so CSS alone must show content
            # ============================================
            
            # 4a. body opacity: 0 → 1
            content = re.sub(
                r'body\s*\{\s*\n\s*opacity:\s*0\s*!important',
                'body { \n      opacity: 1 !important',
                content
            )
            
            # 4b. Remove .app-ready requirement from container display rules
            # BEFORE: html.user-logged-in.app-ready #app-container { display: flex !important; }
            # AFTER:  html.user-logged-in #app-container { display: flex !important; }
            content = re.sub(
                r'html\.user-logged-in\.app-ready\s+#app-container',
                'html.user-logged-in #app-container',
                content
            )
            content = re.sub(
                r'html\.user-logged-in\.app-ready\s+#login-container',
                'html.user-logged-in #login-container',
                content
            )
            content = re.sub(
                r'html\.user-not-logged-in\.app-ready\s+#login-container',
                'html.user-not-logged-in #login-container',
                content
            )
            content = re.sub(
                r'html\.user-not-logged-in\.app-ready\s+#app-container',
                'html.user-not-logged-in #app-container',
                content
            )
            
            # 4c. Also remove body.app-ready requirement
            content = re.sub(
                r'body\.app-ready\s*\{',
                'body {',
                content
            )
            
            # ============================================
            # PHASE 5: Defer heavy scripts to prevent main thread blocking
            # The web process crashes because synchronous JS execution blocks
            # the main thread too long. Defer allows DOM to render first.
            # Keep cordova.js, cordova-init.js, base-url.js NON-deferred (in <head>)
            # ============================================
            heavy_scripts = [
                'translations.js',    # 882KB!
                'script.js',          # 630KB!
                'missions-system.js', # 32KB
                'pin-lock-system.js', # 27KB
                'notification-system.js', # 25KB
                'offline-detection.js',   # 22KB
                'fcm-notifications.js',   # 22KB
                'cordova-re-engagement.js', # 18KB
                'stats.js',
                'state-activity.js',
                'profile-member-since.js',
                'install-prompt.js',
            ]
            for script_name in heavy_scripts:
                # Match <script src="scriptname.js"></script> and add defer
                pattern = r'(<script\s+src="' + re.escape(script_name) + r'")(>)'
                content = re.sub(pattern, r'\1 defer\2', content)
            
            # ============================================
            # PHASE 6: Remove ad-related scripts (no AdMob on iOS)
            # ============================================
            content = re.sub(r'<script\s+src="activity-ad-system\.js"[^>]*>\s*</script>\s*\n?', '<!-- ad system removed for iOS -->\n', content)
            content = re.sub(r'<script\s+src="ad-boost-system\.js"[^>]*>\s*</script>\s*\n?', '<!-- ad boost removed for iOS -->\n', content)
            
            # ============================================
            # PHASE 7: Fix Service Worker - skip in Cordova
            # ============================================
            content = content.replace(
                "if ('serviceWorker' in navigator)",
                "if (false && 'serviceWorker' in navigator)"
            )
            
            # ============================================
            # PHASE 8: Fix HTML structure - move languageModal from <head> to <body>
            # A <div> inside <head> is INVALID HTML. WKWebView creates an implicit
            # <body> when it encounters it, breaking the entire DOM tree.
            # ============================================
            modal_start = content.find('<div id="languageModal"')
            if modal_start == -1:
                modal_start = content.find("<div id='languageModal'")
            if modal_start != -1:
                # Find matching closing </div> by counting open/close tags
                depth = 0
                i = modal_start
                modal_end = -1
                while i < len(content):
                    if content[i:i+4] == '<div':
                        depth += 1
                    elif content[i:i+6] == '</div>':
                        depth -= 1
                        if depth == 0:
                            modal_end = i + 6
                            break
                    i += 1
                if modal_end != -1:
                    # Check if it's inside <head> (before <body>)
                    body_pos = content.find('<body')
                    if body_pos == -1 or modal_start < body_pos:
                        modal_html = content[modal_start:modal_end]
                        content = content[:modal_start] + content[modal_end:]
                        # Recalculate body position after removal
                        body_match = re.search(r'(<body[^>]*>)', content)
                        if body_match:
                            insert_pos = body_match.end()
                            content = content[:insert_pos] + '\n' + modal_html + '\n' + content[insert_pos:]
                            print('    Moved languageModal from <head> to <body>')
                    else:
                        print('    languageModal already after <body>, skipping move')
            
            # ============================================
            # PHASE 9: Replace target="_blank" with target="_self"
            # Without InAppBrowser plugin, _blank links do nothing.
            # With _self, Cordova intercepts the navigation and opens
            # external URLs in Safari via <allow-intent>.
            # ============================================
            content = content.replace('target="_blank"', 'target="_self"')
            content = content.replace("target='_blank'", "target='_self'")
            
            # ============================================
            # PHASE 10: Inject iOS safety script after <body>
            # - Visibility enforcement
            # - Override window.open: external URLs → location.href
            #   (Cordova opens non-whitelisted URLs in Safari automatically)
            # - Intercept dynamically created _blank links via click handler
            # ============================================
            safety = """<script>
        (function() {
          // Visibility enforcement
          var t = setInterval(function() {
            if (document.body) {
              document.body.style.opacity = '1';
              document.body.classList.add('app-ready');
              document.documentElement.classList.add('app-ready');
              clearInterval(t);
            }
          }, 100);

          // Override window.open: navigate via location.href
          // Cordova will open external URLs in Safari via <allow-intent>
          window.open = function(url) {
            if (url && typeof url === 'string') {
              if (url.match(/^https?:\/\//)) {
                window.location.href = url;
                return null;
              }
              if (url.indexOf('.html') !== -1 || url.startsWith('./') || url.startsWith('/') || url.startsWith('app://')) {
                window.location.href = url;
                return null;
              }
            }
            return null;
          };

          // Catch any remaining _blank link clicks
          document.addEventListener('click', function(e) {
            var a = e.target;
            while (a && a.tagName !== 'A') a = a.parentElement;
            if (a && a.target === '_blank' && a.href && a.href.match(/^https?:\/\//)) {
              e.preventDefault();
              window.location.href = a.href;
            }
          }, true);
        })();
        </script>"""
            content = re.sub(r'(<body[^>]*>)', r'\1\n' + safety, content, count=1)
            
            with open(filepath, 'w', encoding='utf-8') as f:
                f.write(content)
            
            new_len = len(content)
            removed = original_len - new_len
            print(f"  ✅ {original_len} → {new_len} bytes ({'+' if removed < 0 else '-'}{abs(removed)} bytes)")
        
        # ====== PATCH FILES ======
        patch_file('www/index.html')
        
        platform_files = glob.glob('platforms/ios/**/www/index.html', recursive=True)
        for pf in platform_files:
            if 'Pods' not in pf:
                patch_file(pf)
        
        # ====== PATCH CSS FILES - Remove render-blocking @import ======
        print('\n--- Phase: CSS @import cleanup ---')
        css_files = glob.glob('www/*.css') + glob.glob('platforms/ios/**/www/*.css', recursive=True)
        for css_file in css_files:
            if 'Pods' in css_file:
                continue
            try:
                with open(css_file, 'r', encoding='utf-8') as f:
                    css = f.read()
                original = len(css)
                css = re.sub(r"@import\s+url\(['\"]?https?://[^)]*\)['\"]?\s*;?\s*\n?", '', css)
                if len(css) != original:
                    with open(css_file, 'w', encoding='utf-8') as f:
                        f.write(css)
                    print(f"  ✅ Removed @import from {css_file} ({original - len(css)} bytes)")
            except Exception as e:
                print(f"  ⚠️ {css_file}: {e}")
        
        # ====== VERIFICATION ======
        print('\n' + '='*50)
        print('VERIFICATION')
        print('='*50)
        with open('www/index.html', 'r') as f:
            html = f.read()
        
        checks = {
            'crossorigin attrs': len(re.findall(r'\bcrossorigin\b', html)),
            'integrity attrs': len(re.findall(r'\bintegrity=', html)),
            'preconnect links': len(re.findall(r'rel="preconnect"', html)),
            'Google Fonts': len(re.findall(r'fonts\.googleapis\.com', html)),
            'COEP/COOP headers': len(re.findall(r'Embedder-Policy|Opener-Policy', html)),
            'monetag': len(re.findall(r'monetag', html)),
            'Font Awesome CDN': len(re.findall(r'font-awesome/6\.\d', html)),
            'opacity: 0': len(re.findall(r'opacity:\s*0\s*!important', html)),
            '.app-ready in CSS': len(re.findall(r'\.app-ready\s+#(?:login|app)-container', html)),
        }
        
        # Count deferred scripts
        deferred = len(re.findall(r'<script[^>]+defer', html))
        non_deferred_src = re.findall(r'<script\s+src="([^"]+)"(?:(?!defer)[^>])*>', html)
        
        all_ok = True
        for name, count in checks.items():
            status = '✅' if count == 0 else '❌'
            if count > 0: all_ok = False
            print(f"  {status} {name}: {count}")
        
        print(f"\n  📊 Deferred scripts: {deferred}")
        print(f"  📊 Non-deferred src scripts: {non_deferred_src}")
        
        if all_ok:
            print('\n✅ ALL CHECKS PASSED - iOS page is optimized for WKWebView')
        else:
            print('\n⚠️ Some issues remain')
        
        PYEOF

    - name: Build iOS (No Code Signing - Unsigned)
      working-directory: cordova-app
      run: |
        echo '🚧 Building iOS (unsigned - no code signing)...'
        
        # Use the CocoaPods-generated .xcworkspace (NOT the one inside .xcodeproj)
        WORKSPACE=$(find platforms/ios -maxdepth 1 -name "*.xcworkspace" | head -1)
        SCHEME="Access Network"
        
        if [ -z "$WORKSPACE" ]; then
          WORKSPACE=$(find platforms/ios -name "*.xcworkspace" ! -path "*xcodeproj*" | head -1)
        fi
        
        if [ -z "$WORKSPACE" ]; then
          echo '⚠️ No standalone .xcworkspace found, looking for any...'
          WORKSPACE=$(find platforms/ios -name "*.xcworkspace" | head -1)
        fi
        
        echo "Using workspace: $WORKSPACE"
        echo "Scheme: $SCHEME"
        
        # Ensure pods are synced
        cd platforms/ios
        pod install 2>&1 | tail -10 || true
        cd ../..
        
        if [ -n "$WORKSPACE" ]; then
          # Build TWO versions:
          # 1. Simulator build (for Appetize.io testing) - exclude arm64 for GoogleSignIn 5.x compat
          # 2. Device build (for future signing/IPA)
          
          echo '📱 Building for SIMULATOR (x86_64 - for Appetize.io)...'
          set -o pipefail
          xcodebuild build \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -derivedDataPath build-simulator \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_ENTITLEMENTS="" \
            ONLY_ACTIVE_ARCH=NO \
            EXCLUDED_ARCHS='arm64' \
            2>&1 | tee /tmp/xcodebuild-sim.log | tail -80
          
          SIM_EXIT=${PIPESTATUS[0]}
          if [ $SIM_EXIT -eq 0 ]; then
            echo '✅ Simulator build completed successfully'
          else
            echo "❌ Simulator build failed with code $SIM_EXIT"
            grep -i "error:" /tmp/xcodebuild-sim.log | tail -20
          fi
          
          echo ''
          echo '📱 Building for DEVICE (arm64 - for IPA/signing)...'
          xcodebuild build \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build-device \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_ENTITLEMENTS="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tee /tmp/xcodebuild-dev.log | tail -80
          
          DEV_EXIT=${PIPESTATUS[0]}
          if [ $DEV_EXIT -eq 0 ]; then
            echo '✅ Device build completed successfully'
          else
            echo "⚠️ Device build failed (non-critical for testing)"
            grep -i "error:" /tmp/xcodebuild-dev.log | tail -10
          fi
          
          # At least one must succeed
          if [ $SIM_EXIT -ne 0 ] && [ $DEV_EXIT -ne 0 ]; then
            echo '❌ Both builds failed!'
            exit 1
          fi
        else
          echo '❌ No Xcode workspace/project found'
          find platforms/ios -maxdepth 3 -type d
          exit 1
        fi
    
    - name: Find and package build outputs
      working-directory: cordova-app
      run: |
        echo '📱 Searching for .app builds...'
        
        # Simulator build (for Appetize.io)
        SIM_APP=$(find build-simulator -name "Access Network.app" -type d 2>/dev/null | head -1)
        if [ -n "$SIM_APP" ]; then
          echo "✅ Simulator .app found: $SIM_APP"
          mkdir -p output-simulator
          cp -R "$SIM_APP" output-simulator/
          
          # ✅ Safety net: Remove any static frameworks from Frameworks/ directory
          # With default use_frameworks! (static linkage), pods should be linked into
          # the main binary. But CocoaPods may still copy .framework bundles.
          # If any contain static archives (.a), dyld can't load them -> crash.
          FRAMEWORKS_DIR="output-simulator/Access Network.app/Frameworks"
          if [ -d "$FRAMEWORKS_DIR" ]; then
            echo "🔍 Checking Frameworks/ for static archives..."
            find "$FRAMEWORKS_DIR" -name "*.framework" -type d | while read fw; do
              FW_NAME=$(basename "$fw" .framework)
              BINARY="$fw/$FW_NAME"
              if [ -f "$BINARY" ]; then
                FILE_TYPE=$(file "$BINARY")
                echo "  📋 $FW_NAME: $FILE_TYPE"
                if echo "$FILE_TYPE" | grep -q "ar archive"; then
                  echo "  🗑️ Removing STATIC framework: $FW_NAME (ar archive can't be loaded by dyld)"
                  rm -rf "$fw"
                elif echo "$FILE_TYPE" | grep -q "current ar archive"; then
                  echo "  🗑️ Removing STATIC framework: $FW_NAME (ar archive can't be loaded by dyld)"
                  rm -rf "$fw"
                else
                  echo "  ✅ Keeping dynamic framework: $FW_NAME"
                fi
              fi
            done
            echo "📁 Remaining frameworks after cleanup:"
            ls -la "$FRAMEWORKS_DIR" 2>/dev/null || echo "  (Frameworks directory empty or removed)"
          else
            echo "ℹ️ No Frameworks/ directory found (expected with static linking)"
          fi
          
          # Create a ready-to-upload zip for Appetize.io
          cd output-simulator
          zip -r ../AccessNetwork-Simulator.zip "Access Network.app"
          cd ..
          echo "📦 Simulator zip created:"
          ls -la AccessNetwork-Simulator.zip
        else
          echo '⚠️ No simulator .app found'
          find build-simulator -maxdepth 5 -name "*.app" -type d 2>/dev/null || echo 'Nothing in build-simulator'
        fi
        
        # Device build (for future signing)
        DEV_APP=$(find build-device -name "Access Network.app" -type d 2>/dev/null | head -1)
        if [ -n "$DEV_APP" ]; then
          echo "✅ Device .app found: $DEV_APP"
          mkdir -p output-device
          cp -R "$DEV_APP" output-device/
          echo "📦 Device build packaged"
          ls -la output-device/
        else
          echo '⚠️ No device .app found'
        fi
    
