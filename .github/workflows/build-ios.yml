name: Build iOS App

on:
  push:
    branches: [ main ]
    paths:
      - 'cordova-app/**'
      - '.github/workflows/build-ios.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.4'
    
    - name: Install CocoaPods
      run: |
        echo '📦 Installing CocoaPods...'
        sudo gem install cocoapods
        pod --version
        echo '✅ CocoaPods installed'
    
    - name: Install Cordova CLI
      run: npm install -g cordova@12
    
    - name: Install project dependencies
      working-directory: cordova-app
      run: npm install
    
    - name: Generate iOS icon sizes from source
      working-directory: cordova-app
      run: |
        echo '🖼️ Generating all required iOS icon sizes...'
        # Use the same icon as Android: test-icon.jpg (1024x1024)
        SOURCE="www/test-icon.jpg"
        if [ ! -f "$SOURCE" ]; then
          echo "⚠️ test-icon.jpg not found, falling back to access-store-512.png"
          SOURCE="www/access-store-512.png"
        fi
        if [ ! -f "$SOURCE" ]; then
          SOURCE="www/access-store.png"
        fi
        
        mkdir -p res/ios-icons
        
        # Convert JPEG source to PNG first (iOS requires PNG icons)
        sips -s format png "$SOURCE" --out "res/ios-icons/source-1024.png" > /dev/null 2>&1
        PNG_SOURCE="res/ios-icons/source-1024.png"
        
        # Generate all iOS required icon sizes from the PNG source
        for SIZE in 20 29 40 58 60 76 80 87 120 152 167 180 1024; do
          sips -z $SIZE $SIZE "$PNG_SOURCE" --out "res/ios-icons/icon-${SIZE}.png" > /dev/null 2>&1
          echo "  ✅ icon-${SIZE}.png"
        done
        
        echo '✅ All iOS icons generated'
        ls -la res/ios-icons/
    
    - name: Install Cordova Plugins for iOS
      working-directory: cordova-app
      run: |
        echo '🔌 Installing Cordova plugins for iOS...'
        
        # Splash screen
        cordova plugin add cordova-plugin-splashscreen@6.0.2 --save 2>/dev/null || true
        
        # ⚠️ SKIP Google Sign-In for iOS builds
        # GoogleSignIn 5.x ships pre-compiled STATIC GoogleUtilities.framework that conflicts
        # with Firebase's own GoogleUtilities pod.
        # This causes dyld crash: "Library not loaded: @rpath/GoogleUtilities.framework"
        # because the framework binary is a static archive, not a dynamic library.
        # Google Sign-In will be re-enabled when upgrading to GoogleSignIn 7.x (XCFramework).
        echo '⏭️ Skipping cordova-plugin-googleplus for iOS (GoogleSignIn 5.x dyld conflict)'
        
        # Firebase Cloud Messaging
        cordova plugin add cordova-plugin-firebase-messaging@7.0.2 --save 2>/dev/null || true
        
        # ⚠️ SKIP AdMob for iOS builds
        # cordova-plugin-ads (cordova-admobsdk) ships pre-compiled GoogleAppMeasurement,
        # GoogleUtilities, nanopb, PromisesObjC frameworks that CONFLICT with CocoaPods-
        # built versions from Firebase. Causes duplicate symbols / missing symbols crash.
        # AdMob will work on Android. iOS AdMob can be added later via CocoaPods directly.
        echo '⏭️ Skipping cordova-plugin-ads for iOS (pre-compiled framework conflicts)'
        
        # ⚠️ SKIP InAppBrowser for iOS builds
        # The IAB plugin's close() method causes WebProcess crash loops on iOS.
        # It overrides window.open at plugin level, bypassing any JS override.
        # External URLs will open in Safari via Cordova's <allow-intent> mechanism.
        echo '⏭️ Skipping cordova-plugin-inappbrowser for iOS (WebProcess crash)'
        
        # Biometric (Face ID / Touch ID)
        cordova plugin add cordova-plugin-fingerprint-aio@5.0.1 --save \
          --variable FACEID_USAGE_DESCRIPTION="Access Network uses Face ID to unlock the app securely" \
          2>/dev/null || true
        
        # Skip android-permissions (Android only)
        echo '⏭️ Skipping cordova-plugin-android-permissions (Android only)'
        
        echo '✅ All plugins installed'
    
    - name: Fix pod version conflicts before platform add
      working-directory: cordova-app
      run: |
        echo '🔧 Fixing pod versions for iOS compatibility...'
        
        # Fix firebase-messaging plugin to use Firebase 8.x
        FCM_PLUGIN="plugins/cordova-plugin-firebase-messaging/plugin.xml"
        if [ -f "$FCM_PLUGIN" ]; then
          sed -i '' 's|spec="$IOS_FIREBASE_POD_VERSION"|spec="~> 8.15.0"|g' "$FCM_PLUGIN"
          perl -pi -e 's/Firebase\/Messaging.*?spec="[^"]*"/Firebase\/Messaging" spec="~> 8.15.0"/g' "$FCM_PLUGIN"
          perl -pi -e 's/Firebase\/Analytics.*?spec="[^"]*"/Firebase\/Analytics" spec="~> 8.15.0"/g' "$FCM_PLUGIN"
          echo '✅ Firebase pod version set to ~> 8.15.0'
          grep -n 'pod name.*Firebase' "$FCM_PLUGIN" || true
        fi
        
        # Also fix firebase-analytics plugin
        ANALYTICS_PLUGIN="plugins/cordova-plugin-firebase-analytics/plugin.xml"
        if [ -f "$ANALYTICS_PLUGIN" ]; then
          perl -pi -e 's/Firebase\/Analytics.*?spec="[^"]*"/Firebase\/Analytics" spec="~> 8.15.0"/g' "$ANALYTICS_PLUGIN"
          echo '✅ Firebase Analytics pod version set to ~> 8.15.0'
        fi
        
        echo '✅ Pod version fixes applied (no GoogleSignIn in iOS build)'
    

    - name: Remove conflicting plugins from config.xml for iOS
      working-directory: cordova-app
      run: |
        echo '🔧 Removing conflicting plugins from config.xml for iOS build...'
        echo '   GoogleSignIn 5.x & AdMob ship pre-compiled frameworks that conflict with'
        echo '   CocoaPods Firebase. Both still work on Android via build-android.yml.'
        
        # Remove cordova-plugin-googleplus
        perl -0777 -i -pe 's|\s*<!-- Google Sign-In.*?-->\s*<plugin name="cordova-plugin-googleplus".*?</plugin>||s' config.xml
        if grep -q 'cordova-plugin-googleplus' config.xml; then
          sed -i '' '/<plugin name="cordova-plugin-googleplus"/,/<\/plugin>/d' config.xml
          sed -i '' '/Google Sign-In Plugin/d' config.xml
        fi
        echo '✅ cordova-plugin-googleplus removed'
        
        # Remove cordova-plugin-ads (cordova-admobsdk)
        perl -0777 -i -pe 's|\s*<plugin name="cordova-plugin-ads".*?</plugin>||s' config.xml
        if grep -q 'cordova-plugin-ads' config.xml; then
          sed -i '' '/<plugin name="cordova-plugin-ads"/,/<\/plugin>/d' config.xml
        fi
        # Also remove cordova-admobsdk reference
        perl -0777 -i -pe 's|\s*<plugin name="cordova-admobsdk".*?</plugin>||s' config.xml
        if grep -q 'cordova-admobsdk' config.xml; then
          sed -i '' '/<plugin name="cordova-admobsdk"/,/<\/plugin>/d' config.xml
        fi
        echo '✅ cordova-plugin-ads / cordova-admobsdk removed'
        
        # Verify
        grep -n 'googleplus\|GoogleSignIn\|cordova-plugin-ads\|cordova-admobsdk\|admob' config.xml || echo '   (confirmed: no conflicting plugins)'
        
        # Remove from package.json
        echo '🔧 Cleaning package.json...'
        node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
          if (pkg.dependencies) {
            delete pkg.dependencies['cordova-plugin-googleplus'];
            delete pkg.dependencies['cordova-plugin-ads'];
            delete pkg.dependencies['cordova-admobsdk'];
          }
          if (pkg.cordova && pkg.cordova.plugins) {
            delete pkg.cordova.plugins['cordova-plugin-googleplus'];
            delete pkg.cordova.plugins['cordova-plugin-ads'];
            delete pkg.cordova.plugins['cordova-admobsdk'];
          }
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          console.log('✅ Cleaned package.json');
        "
        grep -i 'googleplus\|admob' package.json && echo '⚠️ Still references' || echo '   (confirmed: clean package.json)'


    - name: Add iOS platform (allow pod install to fail, we fix it later)
      working-directory: cordova-app
      run: |
        echo '📱 Adding iOS platform (cordova-ios 7.1.1)...'
        cordova platform remove ios 2>/dev/null || true
        # Platform add may fail during pod install due to version conflicts
        # We'll fix and re-run pod install in the next step
        cordova platform add ios@7.1.1 2>&1 || {
          echo '⚠️ Platform add had issues (likely CocoaPods), will fix in next step...'
          # Check if the platform directory was actually created
          if [ -d "platforms/ios" ]; then
            echo '✅ iOS platform directory exists, continuing...'
          else
            echo '❌ iOS platform directory not created, retrying without pods...'
            exit 1
          fi
        }
        echo '✅ iOS platform step completed'
    
    - name: Fix CocoaPods Podfile and resolve conflicts
      working-directory: cordova-app/platforms/ios
      run: |
        echo '🔧 Fixing Podfile for compatible pod versions...'
        
        if [ ! -f "Podfile" ]; then
          echo '❌ No Podfile found'
          exit 1
        fi
        
        # Remove stale lock file to allow fresh resolution
        rm -f Podfile.lock
        
        echo '📋 Current Podfile:'
        cat Podfile
        echo ''
        
        # Force Firebase to 8.x (stable, compatible with current SDK versions)
        sed -i '' "s|pod 'Firebase/Messaging', '~> 9.[0-9.]*'|pod 'Firebase/Messaging', '~> 8.15.0'|g" Podfile
        sed -i '' "s|pod 'Firebase/Messaging', '~> 10.[0-9.]*'|pod 'Firebase/Messaging', '~> 8.15.0'|g" Podfile
        sed -i '' "s|pod 'Firebase/Analytics', '~> 9.[0-9.]*'|pod 'Firebase/Analytics', '~> 8.15.0'|g" Podfile
        sed -i '' "s|pod 'Firebase/Analytics', '~> 10.[0-9.]*'|pod 'Firebase/Analytics', '~> 8.15.0'|g" Podfile
        
        # Remove any leftover GoogleSignIn/AppAuth/GTM pods (from prior builds)
        sed -i '' "/pod 'GoogleSignIn'/d" Podfile
        sed -i '' "/pod 'GoogleUtilities'/d" Podfile
        sed -i '' "/pod 'AppAuth'/d" Podfile
        sed -i '' "/pod 'GTMAppAuth'/d" Podfile
        sed -i '' "/pod 'GTMSessionFetcher'/d" Podfile
        echo '✅ Cleaned Podfile of GoogleSignIn/AdMob leftovers'
        
        # Remove GoogleSignIn and AdMob plugin files from the Xcode project
        rm -rf "Access Network/Plugins/cordova-plugin-googleplus" 2>/dev/null || true
        rm -rf "Access Network/Plugins/cordova-admobsdk" 2>/dev/null || true
        rm -rf "Access Network/Plugins/cordova-plugin-ads" 2>/dev/null || true
        if [ -f "Access Network.xcodeproj/project.pbxproj" ]; then
          sed -i '' '/GoogleSignIn/d' "Access Network.xcodeproj/project.pbxproj"
          sed -i '' '/cordova-plugin-googleplus/d' "Access Network.xcodeproj/project.pbxproj"
          sed -i '' '/cordova-admobsdk/d' "Access Network.xcodeproj/project.pbxproj"
          sed -i '' '/cordova-plugin-ads/d' "Access Network.xcodeproj/project.pbxproj"
          sed -i '' '/GoogleMobileAds/d' "Access Network.xcodeproj/project.pbxproj"
          sed -i '' '/GoogleAppMeasurement/d' "Access Network.xcodeproj/project.pbxproj"
          sed -i '' '/UserMessagingPlatform/d' "Access Network.xcodeproj/project.pbxproj"
          echo '✅ Cleaned Xcode project references'
        fi
        
        # ✅ Add post_install hook: EXCLUDED_ARCHS for Apple Silicon runner
        # Also force GoogleUtilities & nanopb to build as REAL dynamic libraries.
        # Their podspec has static_framework=true -> builds static archives in .framework
        # bundles -> dyld can't load them. MACH_O_TYPE=mh_dylib overrides this.
        if ! grep -q "EXCLUDED_ARCHS" Podfile; then
          printf '\npost_install do |installer|\n  installer.pods_project.targets.each do |target|\n    target.build_configurations.each do |config|\n      config.build_settings['"'"'EXCLUDED_ARCHS[sdk=iphonesimulator*]'"'"'] = '"'"'arm64'"'"'\n      if ['"'"'GoogleUtilities'"'"', '"'"'nanopb'"'"'].include?(target.name) || target.name.start_with?('"'"'GoogleUtilities-'"'"')\n        config.build_settings['"'"'MACH_O_TYPE'"'"'] = '"'"'mh_dylib'"'"'\n      end\n    end\n  end\nend\n' >> Podfile
          echo '✅ Added post_install hook'
        fi
        
        echo '📋 Fixed Podfile:'
        cat Podfile
        echo ''
        
        # Fresh pod install
        echo '📦 Running pod install with fresh resolution...'
        pod install --repo-update 2>&1 | tail -30
        
        # Verify Podfile.lock
        if [ -f "Podfile.lock" ]; then
          echo '✅ Podfile.lock created'
          echo '📋 Installed pods:'
          grep '  - ' Podfile.lock | head -20
        else
          echo '❌ Podfile.lock NOT created - pod install failed'
          exit 1
        fi
        
        echo '✅ CocoaPods resolved successfully'
    
    - name: Copy GoogleService-Info.plist
      working-directory: cordova-app
      run: |
        echo '🔥 Copying GoogleService-Info.plist for Firebase iOS...'
        
        # Copy to platforms/ios/ root (where cordova-plugin-firebase-messaging references it in Xcode project)
        cp GoogleService-Info.plist platforms/ios/GoogleService-Info.plist
        echo "✅ Copied to: platforms/ios/GoogleService-Info.plist (Xcode project reference)"
        
        # Also copy to the app directory (as fallback)
        PLIST_DEST=$(find platforms/ios -maxdepth 2 -name "Access Network" -type d | head -1)
        if [ -z "$PLIST_DEST" ]; then
          PLIST_DEST=$(find platforms/ios -maxdepth 2 -name "Access*" -type d ! -name "*.xcworkspace" ! -name "*.xcodeproj" | head -1)
        fi
        if [ -n "$PLIST_DEST" ]; then
          cp GoogleService-Info.plist "$PLIST_DEST/GoogleService-Info.plist"
          echo "✅ Also copied to: $PLIST_DEST/GoogleService-Info.plist"
        fi
        
        echo "📂 GoogleService-Info.plist locations:"
        find platforms/ios -name "GoogleService-Info.plist" -type f
    
    - name: Verify iOS icons in platform
      working-directory: cordova-app
      run: |
        echo '🖼️ Verifying iOS icons were correctly placed by Cordova...'
        IOS_ICONS_DIR=$(find platforms/ios -path "*/Assets.xcassets/AppIcon.appiconset" -type d | head -1)
        
        if [ -n "$IOS_ICONS_DIR" ]; then
          echo "Icons directory: $IOS_ICONS_DIR"
          ls -la "$IOS_ICONS_DIR/" | head -20
          
          # Check Contents.json references the icons
          if [ -f "$IOS_ICONS_DIR/Contents.json" ]; then
            echo '📋 Contents.json icon entries:'
            grep -o '"filename"[^,]*' "$IOS_ICONS_DIR/Contents.json" | head -15
          fi
          
          # Fallback: if Cordova didn't copy icons properly, copy manually and update Contents.json
          ICON_COUNT=$(find "$IOS_ICONS_DIR" -name "*.png" | wc -l)
          if [ "$ICON_COUNT" -lt 5 ]; then
            echo "⚠️ Only $ICON_COUNT icons found, copying manually..."
            for SIZE in 20 29 40 58 60 76 80 87 120 152 167 180 1024; do
              if [ -f "res/ios-icons/icon-${SIZE}.png" ]; then
                cp "res/ios-icons/icon-${SIZE}.png" "$IOS_ICONS_DIR/icon-${SIZE}.png"
              fi
            done
            # Generate proper Contents.json for Xcode
            printf '%s\n' '{"images":[' '{"filename":"icon-1024.png","idiom":"universal","platform":"ios","size":"1024x1024"},' '{"filename":"icon-20.png","idiom":"iphone","scale":"2x","size":"20x20"},' '{"filename":"icon-60.png","idiom":"iphone","scale":"3x","size":"20x20"},' '{"filename":"icon-58.png","idiom":"iphone","scale":"2x","size":"29x29"},' '{"filename":"icon-87.png","idiom":"iphone","scale":"3x","size":"29x29"},' '{"filename":"icon-80.png","idiom":"iphone","scale":"2x","size":"40x40"},' '{"filename":"icon-120.png","idiom":"iphone","scale":"3x","size":"40x40"},' '{"filename":"icon-120.png","idiom":"iphone","scale":"2x","size":"60x60"},' '{"filename":"icon-180.png","idiom":"iphone","scale":"3x","size":"60x60"},' '{"filename":"icon-40.png","idiom":"ipad","scale":"1x","size":"20x20"},' '{"filename":"icon-40.png","idiom":"ipad","scale":"2x","size":"20x20"},' '{"filename":"icon-29.png","idiom":"ipad","scale":"1x","size":"29x29"},' '{"filename":"icon-58.png","idiom":"ipad","scale":"2x","size":"29x29"},' '{"filename":"icon-40.png","idiom":"ipad","scale":"1x","size":"40x40"},' '{"filename":"icon-80.png","idiom":"ipad","scale":"2x","size":"40x40"},' '{"filename":"icon-76.png","idiom":"ipad","scale":"1x","size":"76x76"},' '{"filename":"icon-152.png","idiom":"ipad","scale":"2x","size":"76x76"},' '{"filename":"icon-167.png","idiom":"ipad","scale":"2x","size":"83.5x83.5"},' '{"filename":"icon-1024.png","idiom":"ios-marketing","scale":"1x","size":"1024x1024"}' '],"info":{"author":"xcode","version":1}}' > "$IOS_ICONS_DIR/Contents.json"
            echo '✅ Contents.json regenerated with correct icon references'
          else
            echo "✅ $ICON_COUNT icons found - looks good"
          fi
        else
          echo '⚠️ Could not find AppIcon.appiconset directory'
          find platforms/ios -name "*.appiconset" -type d 2>/dev/null || true
        fi

    - name: Fix Firebase iOS plist settings
      working-directory: cordova-app
      run: |
        echo '🔧 Setting Firebase plist entries...'
        APP_PLIST=$(find platforms/ios -maxdepth 3 -name "*-Info.plist" ! -path "*/Pods/*" ! -path "*/CordovaLib/*" | head -1)
        if [ -z "$APP_PLIST" ]; then
          APP_PLIST=$(find platforms/ios -path "*/Access Network/Info.plist" | head -1)
        fi
        if [ -z "$APP_PLIST" ]; then
          APP_PLIST=$(find platforms/ios -maxdepth 3 -name "Info.plist" ! -path "*/Pods/*" ! -path "*/Frameworks/*" ! -path "*/CordovaLib/*" | head -1)
        fi
        if [ -n "$APP_PLIST" ]; then
          echo "Main app Info.plist: $APP_PLIST"
          # Enable Firebase AppDelegate proxy (required for cordova-plugin-firebase-messaging auto-configure)
          # Without this, Firebase won't call [FIRApp configure] automatically
          /usr/libexec/PlistBuddy -c "Delete :FirebaseAppDelegateProxyEnabled" "$APP_PLIST" 2>/dev/null || true
          echo "✅ FirebaseAppDelegateProxyEnabled removed (defaults to YES = auto-configure)"
          /usr/libexec/PlistBuddy -c "Print :FirebaseAppDelegateProxyEnabled" "$APP_PLIST" 2>/dev/null || echo "  (not set = defaults to YES)"
        else
          echo "⚠️ Could not find main Info.plist"
          find platforms/ios -name "Info.plist" -type f | head -10
        fi

    - name: Setup LaunchStoryboard for iOS
      working-directory: cordova-app
      run: |
        echo '🚀 Setting up iOS Launch Screen (solid color, no image)...'
        
        # Find the Xcode project paths
        APP_DIR=$(find platforms/ios -maxdepth 2 -name "Access Network" -type d ! -path "*.xcworkspace*" ! -path "*.xcodeproj*" | head -1)
        
        if [ -z "$APP_DIR" ]; then
          echo "⚠️ Could not find app directory, listing platform structure:"
          find platforms/ios -maxdepth 3 -type d | head -20
          echo "Skipping LaunchScreen setup"
          exit 0
        fi
        echo "App dir: $APP_DIR"
        
        # 1. Create minimal LaunchScreen.storyboard — solid dark background, NO image
        cat > "$APP_DIR/LaunchScreen.storyboard" << 'SBEOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <document type="com.apple.InterfaceBuilder3.CocoaTouch.Storyboard.XIB" version="3.0" toolsVersion="21701" targetRuntime="AppleSDK" propertyAccessControl="none" useAutolayout="YES" launchScreen="YES" useTraitCollections="YES" useSafeAreas="YES" colorMatched="YES" initialViewController="01J-lp-oVM">
            <device id="retina6_12" orientation="portrait" appearance="light"/>
            <dependencies>
                <plugIn identifier="com.apple.InterfaceBuilder.IBCocoaTouchPlugin" version="21679"/>
                <capability name="Safe area layout guides" minToolsVersion="9.0"/>
                <capability name="documents saved in the Xcode 8 format" minToolsVersion="8.0"/>
            </dependencies>
            <scenes>
                <scene sceneID="EHf-IW-A2E">
                    <objects>
                        <viewController id="01J-lp-oVM" sceneMemberID="viewController">
                            <view key="view" contentMode="scaleToFill" id="Ze5-6b-2t3">
                                <rect key="frame" x="0.0" y="0.0" width="393" height="852"/>
                                <autoresizingMask key="autoresizingMask" widthSizable="YES" heightSizable="YES"/>
                                <viewLayoutGuide key="safeArea" id="Bcu-3y-fUS"/>
                                <color key="backgroundColor" red="0.10196078431372549" green="0.10196078431372549" blue="0.18039215686274511" alpha="1" colorSpace="custom" customColorSpace="sRGB"/>
                            </view>
                        </viewController>
                        <placeholder placeholderIdentifier="IBFirstResponder" id="iYj-Kq-Ea1" userLabel="First Responder" sceneMemberID="firstResponder"/>
                    </objects>
                    <point key="canvasLocation" x="0.0" y="0.0"/>
                </scene>
            </scenes>
        </document>
        SBEOF
        echo "✅ LaunchScreen.storyboard created (solid #1a1a2e background, no image)"
        
        # 2. Update Info.plist to point to our LaunchScreen.storyboard
        APP_PLIST=$(find platforms/ios -maxdepth 3 -name "*-Info.plist" ! -path "*/Pods/*" ! -path "*/CordovaLib/*" | head -1)
        if [ -z "$APP_PLIST" ]; then
          APP_PLIST=$(find platforms/ios -maxdepth 3 -name "Info.plist" ! -path "*/Pods/*" ! -path "*/Frameworks/*" ! -path "*/CordovaLib/*" | head -1)
        fi
        
        if [ -n "$APP_PLIST" ]; then
          /usr/libexec/PlistBuddy -c "Set :UILaunchStoryboardName LaunchScreen" "$APP_PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :UILaunchStoryboardName string LaunchScreen" "$APP_PLIST"
          echo "✅ Info.plist → UILaunchStoryboardName = LaunchScreen"
          /usr/libexec/PlistBuddy -c "Delete :UILaunchImageName" "$APP_PLIST" 2>/dev/null || true
        fi
        
        # 3. Add LaunchScreen.storyboard to Xcode project build resources
        PBXPROJ=$(find platforms/ios -name "project.pbxproj" | head -1)
        if [ -n "$PBXPROJ" ]; then
          if ! grep -q "LaunchScreen.storyboard" "$PBXPROJ"; then
            echo "📝 Adding LaunchScreen.storyboard to Xcode project..."
            python3 << 'PYEOF'
        import re, os
        
        pbxproj = None
        for root, dirs, files in os.walk('platforms/ios'):
            for f in files:
                if f == 'project.pbxproj':
                    pbxproj = os.path.join(root, f)
                    break
            if pbxproj:
                break
        
        if not pbxproj:
            print("project.pbxproj not found")
            exit(0)
        
        with open(pbxproj, 'r') as f:
            content = f.read()
        
        file_ref_id = 'LAUNCH0001000000000001'
        build_file_id = 'LAUNCH0002000000000001'
        
        if 'LaunchScreen.storyboard' not in content:
            content = content.replace(
                '/* End PBXFileReference section */',
                f'\t\t{file_ref_id} /* LaunchScreen.storyboard */ = {{isa = PBXFileReference; lastKnownFileType = file.storyboard; path = LaunchScreen.storyboard; sourceTree = "<group>"; }};\n/* End PBXFileReference section */'
            )
            content = content.replace(
                '/* End PBXBuildFile section */',
                f'\t\t{build_file_id} /* LaunchScreen.storyboard in Resources */ = {{isa = PBXBuildFile; fileRef = {file_ref_id} /* LaunchScreen.storyboard */; }};\n/* End PBXBuildFile section */'
            )
            resources_pattern = r'(/\* Resources \*/ = \{[^}]*files = \(\s*\n)'
            match = re.search(resources_pattern, content)
            if match:
                insertion_point = match.end()
                content = content[:insertion_point] + f'\t\t\t\t{build_file_id} /* LaunchScreen.storyboard in Resources */,\n' + content[insertion_point:]
            
            # Add to main group so Xcode can find the file
            grp_pat = r'(children = \([^)]*AppDelegate\.m[^)]*?)(\);)'
            grp = re.search(grp_pat, content)
            if grp:
                content = content[:grp.start(2)] + f'\n\t\t\t\t{file_ref_id} /* LaunchScreen.storyboard */,\n\t\t\t' + content[grp.start(2):]
            
            with open(pbxproj, 'w') as f:
                f.write(content)
            print("✅ LaunchScreen.storyboard added to Xcode project")
        else:
            print("ℹ️ LaunchScreen.storyboard already in project")
        
        PYEOF
          else
            echo "ℹ️ LaunchScreen.storyboard already referenced in project"
          fi
